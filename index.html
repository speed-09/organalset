<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SRT Translator (16-Key Rotation)</title>
    <style>
        :root { --accent: #a855f7; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #334155; width: 100%; max-width: 600px; text-align: center; }
        h1 { color: #e2e8f0; margin-bottom: 10px; font-size: 26px; }
        .upload-box { border: 2px dashed #475569; padding: 40px; border-radius: 20px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; background: rgba(30, 41, 59, 0.5); }
        .upload-box:hover { border-color: var(--accent); background: rgba(168, 85, 247, 0.05); }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        #status { margin: 20px 0; font-size: 14px; color: #fbbf24; font-weight: 500; }
        textarea { width: 100%; height: 250px; background: #020617; color: #10b981; border: 1px solid #334155; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 13px; resize: none; margin-top: 20px; display: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <h1>SRT Translator Pro</h1>
    <p style="color:#94a3b8; font-size:12px;">(16-Key Auto Rotation System)</p>

    <div class="upload-box" onclick="document.getElementById('srtFile').click()">
        <span id="fileLabel">SRT ဖိုင် ရွေးချယ်ပါ</span>
        <input type="file" id="srtFile" accept=".srt" style="display:none" onchange="updateFileName()">
    </div>

    <button id="runBtn" onclick="startTranslation()">ဘာသာပြန်ဆိုမည်</button>
    <div id="status">Brave Shield ပိတ်ထားရန် လိုအပ်ပါသည်</div>

    <textarea id="output" readonly></textarea>
</div>

<script>
    // သင်ပေးထားတဲ့ Key ၁၆ ခုလုံးကို စနစ်တကျ ထည့်ထားပါတယ်
    const geminiKeys = [
        "AIzaSyCeUJr4_uNXkaZZnWLbvcy3PYX53LyqnOM", "AIzaSyARz6dEki8suKmwlrQdIZaTnxgEeVPKlXk",
        "AIzaSyB7uDfGi7OUokmP7IpNBGRH8RGWSDHzU-U", "AIzaSyB6rAcwg-zkzV9qDqXs46mZ7y6Ycr5m-nk",
        "AIzaSyCmteLM5BS8HM5PRiswMSb8IgHyFcJz_Xw", "AIzaSyDa8QMr928UyDYGw0ctnkeWNHx0dIW7vo0",
        "AIzaSyBn_wlF3gzB0aXJOfmlmbaRBjEHhVpGFpU", "AIzaSyBJ2AusS7kuvNT123GbGyeksHD7yULx8AA",
        "AIzaSyDVv31SdxQNG0x5SmX10gkdR5IqC6bTnZ4", "AIzaSyATSwdlP9mJ3mToGq-cXW1AuY5sw-C6oeg",
        "AIzaSyCmteLM5BS8HM5PRiswMSb8IgHyFcJz_Xw", "AIzaSyDa8QMr928UyDYGw0ctnkeWNHx0dIW7vo0",
        "AIzaSyBn_wlF3gzB0aXJOfmlmbaRBjEHhVpGFpU", "AIzaSyBJ2AusS7kuvNT123GbGyeksHD7yULx8AA",
        "AIzaSyDVv31SdxQNG0x5SmX10gkdR5IqC6bTnZ4", "AIzaSyATSwdlP9mJ3mToGq-cXW1AuY5sw-C6oeg"
    ];

    function updateFileName() {
        const file = document.getElementById('srtFile').files[0];
        if (file) document.getElementById('fileLabel').innerHTML = `<b>${file.name}</b>`;
    }

    async function startTranslation() {
        const file = document.getElementById('srtFile').files[0];
        if (!file) return alert("ဖိုင်အရင်ရွေးပါ");

        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        
        btn.disabled = true;
        const text = await file.text();
        let finalResult = "";

        for (let i = 0; i < geminiKeys.length; i++) {
            status.innerText = `Key (${i + 1}/${geminiKeys.length}) ဖြင့် ပြန်ဆိုနေသည်...`;
            try {
                finalResult = await callGemini(text, geminiKeys[i].trim());
                if (finalResult) break;
            } catch (e) {
                console.log(`Key ${i+1} fail`);
            }
        }

        if (finalResult) {
            output.value = finalResult;
            output.style.display = "block";
            status.innerText = "အောင်မြင်စွာ ပြီးစီးပါပြီ!";
            
            const blob = new Blob([finalResult], { type: 'text/srt' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "MM_" + file.name;
            a.click();
        } else {
            status.innerText = "Error: Key အားလုံး Limit ပြည့်နေပါသည်။";
        }
        btn.disabled = false;
    }

    async function callGemini(srt, key) {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: "Translate this SRT to Myanmar (Burmese). Keep timestamps unchanged:\n\n" + srt }] }]
            })
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }
</script>
</body>
</html>
