 <!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper AI - Premium SRT Tool</title>
    <style>
        :root {
            --accent: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1a2a3a, var(--bg));
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            font-size: 28px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            transition: 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(0, 242, 254, 0.03);
        }

        input[type="file"] { display: none; }

        .custom-file-upload {
            display: inline-block;
            padding: 10px 20px;
            background: var(--border);
            border-radius: 50px;
            font-size: 14px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .custom-file-upload:hover { background: rgba(255,255,255,0.2); }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--accent-gradient);
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s transform, 0.3s box-shadow;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
        }

        button:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #8b949e;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }

        .fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: 0.4s;
            box-shadow: 0 0 10px var(--accent);
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 20px;
            padding: 15px;
            color: #7ee787;
            font-family: 'Courier New', monospace;
            display: none;
            box-sizing: border-box;
            resize: none;
        }

        #dlBtn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            margin-top: 15px;
            box-shadow: none;
        }

        #dlBtn:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎙️ Whisper SRT Pro</h2>
    
    <input type="hidden" id="apiKey" value="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">

    <div class="upload-area" onclick="document.getElementById('audioFile').click()">
        <span id="fileNameDisplay">အသံဖိုင် (Audio) ရွေးချယ်ပါ</span><br>
        <label class="custom-file-upload">ဖိုင်ရှာရန်</label>
        <input type="file" id="audioFile" accept="audio/*" onchange="updateFileName()">
    </div>

    <button id="runBtn" onclick="generateSRT()">စာသားစတင်ထုတ်ယူမည်</button>
    
    <div class="progress-bar" id="pBar">
        <div class="fill" id="pFill"></div>
    </div>
    <div id="status">အသုံးပြုရန်အသင့်ဖြစ်ပါပြီ</div>
    
    <textarea id="output" readonly></textarea>
    <button id="dlBtn" onclick="downloadSrt()">📥 SRT ကို သိမ်းဆည်းမည်</button>
</div>

<script>
    function updateFileName() {
        const file = document.getElementById('audioFile').files[0];
        if (file) document.getElementById('fileNameDisplay').innerText = file.name;
    }

    async function generateSRT() {
        const file = document.getElementById('audioFile').files[0];
        const key = document.getElementById('apiKey').value;
        if (!file) return alert("ဖိုင်အရင်ရွေးပါ");

        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const pBar = document.getElementById('pBar');
        const pFill = document.getElementById('pFill');
        const output = document.getElementById('output');
        const dlBtn = document.getElementById('dlBtn');

        btn.disabled = true;
        pBar.style.display = 'block';
        pFill.style.width = "40%";
        status.innerText = "AI မှ စကားလုံးများကို ဖတ်နေပါသည်...";

        const formData = new FormData();
        formData.append("file", file);
        formData.append("model", "whisper-large-v3");
        formData.append("response_format", "verbose_json");

        try {
            const response = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}` },
                body: formData
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "API Error");

            let finalSRT = "";
            data.segments.forEach((s, i) => {
                finalSRT += `${i+1}\n${formatTime(s.start)} --> ${formatTime(s.end)}\n${s.text.trim()}\n\n`;
            });

            output.value = finalSRT;
            output.style.display = "block";
            dlBtn.style.display = "block";
            status.innerText = "အောင်မြင်စွာ ပြီးစီးပါပြီ!";
            pFill.style.width = "100%";
        } catch (e) {
            status.innerText = "Error: " + e.message;
            pFill.style.background = "#ff4d4d";
        } finally {
            btn.disabled = false;
        }
    }

    function formatTime(seconds) {
        const date = new Date(seconds * 1000);
        const hh = String(date.getUTCHours()).padStart(2, '0');
        const mm = String(date.getUTCMinutes()).padStart(2, '0');
        const ss = String(date.getUTCSeconds()).padStart(2, '0');
        const ms = String(date.getUTCMilliseconds()).padStart(3, '0');
        return `${hh}:${mm}:${ss},${ms}`;
    }

    function downloadSrt() {
        const content = document.getElementById('output').value;
        const blob = new Blob([content], { type: 'text/srt' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "subtitle.srt";
        a.click();
    }
</script>

</body>
</html>
