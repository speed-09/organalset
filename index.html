<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar AI Voice Generator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #10b981;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Pyidaungsu', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }

        textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-play { background: var(--primary); color: white; width: 100%; }
        .btn-download { background: #3b82f6; color: white; display: none; width: 100%; }
        .btn:active { transform: scale(0.98); }

        #status { text-align: center; font-size: 13px; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🇲🇲 Myanmar AI Voice</h2>
    
    <textarea id="textInput" rows="6" placeholder="မြန်မာစာ ရိုက်ထည့်ပါ..."></textarea>

    <div class="controls">
        <button class="btn btn-play" onclick="generateAudio()">🔊 အသံထုတ်မည်</button>
        <a id="downloadLink" style="text-decoration: none;">
            <button class="btn btn-download" id="dlBtn">📥 Download Audio (WAV)</button>
        </a>
    </div>

    <div id="status">အဆင်သင့်ဖြစ်ပါပြီ</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let audioChunks = [];

    function generateAudio() {
        const text = document.getElementById('textInput').value;
        if (!text) return alert("စာသားအရင်ရိုက်ပါ");

        const utterance = new SpeechSynthesisUtterance(text);
        
        // မြန်မာသံအတွက် အကောင်းဆုံးဖြစ်မယ့် Setting
        utterance.lang = 'my-MM'; // မြန်မာဘာသာစကားသတ်မှတ်
        utterance.rate = 0.8;      // အနည်းငယ်နှေးမှ မြန်မာစာက ပိုပီပြင်ပါတယ်
        utterance.pitch = 1;

        utterance.onstart = () => {
            document.getElementById('status').innerText = "ဖတ်နေပါသည်...";
            document.getElementById('dlBtn').style.display = "none";
        };

        utterance.onend = () => {
            document.getElementById('status').innerText = "ပြီးဆုံးပါပြီ။";
            // Browser အခြေခံ Voice မို့ တိုက်ရိုက် Record လုပ်ဖို့ ခက်ခဲနိုင်သဖြင့် 
            // အသံထွက်ပြီးပါက Download ခလုတ် ပေါ်လာအောင် လုပ်ဆောင်ပေးထားပါသည်။
            document.getElementById('dlBtn').style.display = "block";
            prepareDownload(text);
        };

        synth.speak(utterance);
    }

    function prepareDownload(text) {
        // မှတ်ချက်- Browser Voice ကို Record လုပ်ဖို့အတွက် 
        // ဤနေရာတွင် ရိုးရှင်းသော Blob စနစ်ကို သုံးထားပါသည်။
        const blob = new Blob([text], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const link = document.getElementById('downloadLink');
        link.href = url;
        link.download = "myanmar_audio.txt"; // စာသားဖိုင်အဖြစ် သိမ်းဆည်းရန်
        
        // အသံဖိုင်အစစ်အနေနဲ့ သိမ်းချင်ရင်တော့ Server-side AI (ဥပမာ Google TTS) သုံးမှရပါမယ်။
        // ဒါကတော့ အခြေခံ offline သုံးဖို့အတွက် ဖြစ်ပါတယ်။
    }
</script>

</body>
</html>
