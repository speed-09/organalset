<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Master - AI Voice</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #bb86fc; }
        textarea {
            width: 100%;
            height: 150px;
            background: #2c2c2c;
            color: white;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            resize: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #bb86fc;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #9965f4; }
        audio {
            width: 100%;
            margin-top: 20px;
            display: none;
        }
        .status { margin-top: 10px; font-size: 14px; text-align: center; color: #03dac6; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Text-to-Speech</h2>
    <textarea id="textInput" placeholder="ဒီမှာ စာသားရိုက်ထည့်ပါ..."></textarea>
    <button onclick="generateVoice()">Generate Voice</button>
    <div id="status" class="status"></div>
    <audio id="audioPlayer" controls></audio>
</div>

<script>
    async function generateVoice() {
        const text = document.getElementById('textInput').value;
        const status = document.getElementById('status');
        const audio = document.getElementById('audioPlayer');

        if (!text) return alert("စာအရင်ရိုက်ပါ");

        status.innerText = "Processing... ခဏစောင့်ပါ";
        
        // ElevenLabs API Configuration
        const apiKey = "AIzaSyATSwdlP9mJ3mToGq-cXW1AuY5sw-C6oeg"; // မိမိ API Key ထည့်ရန်
        const voiceId = "pNInz6obpgnuMvYJ7SaI"; // Voice ID (ဥပမာ)

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'xi-api-key': apiKey
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.5 }
                })
            });

            if (!response.ok) throw new Error("API ချိတ်ဆက်မှု အဆင်မပြေပါ");

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            audio.src = url;
            audio.style.display = "block";
            audio.play();
            status.innerText = "အောင်မြင်စွာ ထုတ်ပေးပြီးပါပြီ!";

        } catch (error) {
            status.innerText = "Error: " + error.message;
        }
    }
</script>

</body>
</html>
