<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini API Key Tester</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #bb86fc; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; padding: 15px; border: 1px dashed #555; background: #1e1e1e; word-wrap: break-word; }
    </style>
</head>
<body>
    <h2>Gemini API Key Tester</h2>
    <input type="text" id="keyInput" placeholder="ဒီမှာ API Key ထည့်ပါ...">
    <br>
    <button onclick="testKey()">စမ်းသပ်မည်</button>
    <div id="result">ရလဒ်ကို ဒီမှာ ပြပေးပါမယ်...</div>

    <script>
        async function testKey() {
            const apiKey = document.getElementById('keyInput').value;
            const resultDiv = document.getElementById('result');
            
            if(!apiKey) return alert("Key အရင်ထည့်ပါ");
            
            resultDiv.innerText = "စစ်ဆေးနေပါသည်... (VPN ဖွင့်ထားဖို့ မမေ့ပါနဲ့)";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Hello, are you working?" }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates) {
                    resultDiv.style.color = "#03dac6";
                    resultDiv.innerText = "အောင်မြင်ပါတယ်! API Key အလုပ်လုပ်နေပါပြီ။ AI အဖြေ: " + data.candidates[0].content.parts[0].text;
                } else {
                    resultDiv.style.color = "#cf6679";
                    resultDiv.innerText = "Error: " + JSON.stringify(data.error.message);
                }
            } catch (error) {
                resultDiv.style.color = "#cf6679";
                resultDiv.innerText = "ချိတ်ဆက်မှု မအောင်မြင်ပါ: " + error.message;
            }
        }
    </script>
</body>
</html>
