<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SubtitleAI PRO (All-in-One)</title>

<style>
body{background:#0d1117;color:#fff;font-family:sans-serif;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#161b22;padding:15px;border-radius:10px;margin:15px 0}
button{padding:10px;background:#00f28f;border:none;border-radius:8px;margin-top:10px}
textarea{width:100%;height:150px;margin-top:10px}
input{margin-top:10px}
</style>
</head>

<body>

<div class="container">
<h1>🔥 SubtitleAI PRO</h1>

<div class="card">
<h3>🔑 API Keys</h3>
<input id="groqKey" placeholder="Groq Key">
<input id="geminiKey" placeholder="Gemini Key">
<button onclick="saveKeys()">Save</button>
</div>

<div class="card">
<h3>🎤 Upload Audio</h3>
<input type="file" id="file">
<button onclick="runAll()">🚀 Start</button>
</div>

<div class="card">
<h3>📄 English Text</h3>
<textarea id="text"></textarea>
</div>

<div class="card">
<h3>🌏 Burmese</h3>
<textarea id="mm"></textarea>
<button onclick="makeSRT()">Generate SRT</button>
<button onclick="downloadSRT()">Download</button>
</div>

<div class="card">
<h3>🔊 Voice</h3>
<button onclick="playVoice()">Play Voice</button>
</div>

</div>

<script>

/* SAVE */
function saveKeys(){
  localStorage.setItem("groq",groqKey.value);
  localStorage.setItem("gemini",geminiKey.value);
  alert("Saved");
}

/* MAIN FLOW */
async function runAll(){
  const file = document.getElementById("file").files[0];
  const groq = localStorage.getItem("groq");
  const gemini = localStorage.getItem("gemini");

  if(!file || !groq || !gemini){
    alert("Missing file or key");
    return;
  }

  /* TRANSCRIBE */
  const fd = new FormData();
  fd.append("file",file);
  fd.append("model","whisper-large-v3");

  const r1 = await fetch("https://api.groq.com/openai/v1/audio/transcriptions",{
    method:"POST",
    headers:{Authorization:"Bearer "+groq},
    body:fd
  });

  const d1 = await r1.json();
  text.value = d1.text;

  /* TRANSLATE */
  const r2 = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${gemini}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      contents:[{parts:[{text:`Translate to natural Burmese:\n${d1.text}`}]}]
    })
  });

  const d2 = await r2.json();
  mm.value = d2.candidates[0].content.parts[0].text;
}

/* SRT */
let srtData="";

function makeSRT(){
  const lines = mm.value.split("\n");
  srtData="";

  lines.forEach((l,i)=>{
    let start=`00:00:${String(i*2).padStart(2,"0")},000`;
    let end=`00:00:${String(i*2+2).padStart(2,"0")},000`;

    srtData += `${i+1}\n${start} --> ${end}\n${l}\n\n`;
  });

  alert("SRT Ready");
}

/* DOWNLOAD */
function downloadSRT(){
  const blob = new Blob([srtData],{type:"text/plain"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="subtitle.srt";
  a.click();
}

/* VOICE */
function playVoice(){
  const speech=new SpeechSynthesisUtterance(mm.value);
  speech.lang="my-MM";
  speechSynthesis.speak(speech);
}

</script>

</body>
</html>
