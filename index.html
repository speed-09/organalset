<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whisper SRT Master</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h1{
color:#38bdf8;
}

input{
margin:20px 0;
}

button{
background:#38bdf8;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.progress{
width:100%;
background:#334155;
height:20px;
border-radius:10px;
margin-top:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#22c55e;
transition:0.3s;
}

.time{
margin-top:15px;
color:#facc15;
}
</style>
</head>

<body>

<div class="container">

<h1>🎙 Whisper SRT Master</h1>

<p>MP3 ➜ Original SRT Subtitle</p>

<input type="file" id="audioFile" accept="audio/*">

<br>

<button onclick="startProcess()">Generate SRT</button>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div class="time" id="status">Waiting...</div>

</div>

<script>

const keys = [
"KEY1",
"KEY2",
"KEY3"
];

let keyIndex = 0;

function getKey(){
const key = keys[keyIndex];
keyIndex = (keyIndex+1)%keys.length;
return key;
}

async function startProcess(){

const file = document.getElementById("audioFile").files[0];
if(!file){
alert("Upload MP3 first");
return;
}

const startTime = Date.now();

document.getElementById("status").innerText="Uploading...";

const formData = new FormData();
formData.append("file",file);
formData.append("model","whisper-large-v3");
formData.append("response_format","srt");

const res = await fetch("https://api.groq.com/openai/v1/audio/transcriptions",{
method:"POST",
headers:{
Authorization:"Bearer "+getKey()
},
body:formData
});

const text = await res.text();

document.getElementById("bar").style.width="100%";

const seconds = ((Date.now()-startTime)/1000).toFixed(1);

document.getElementById("status").innerText =
"✅ Done in "+seconds+" sec";

download(text);

}

function download(data){

const blob = new Blob([data],{type:"text/plain"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href=url;
a.download="subtitle.srt";
a.click();

}

</script>

</body>
</html>
