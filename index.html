<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper SRT Master - Auto Keys</title>
    <style>
        :root { --accent: #00f2fe; --bg: #0d1117; --card: #161b22; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; align-items: center; margin: 0; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #30363d; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--accent); margin-bottom: 10px; }
        p { font-size: 12px; color: #8b949e; margin-bottom: 25px; }
        .upload-box { border: 2px dashed #30363d; padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--accent); background: rgba(0, 242, 254, 0.05); }
        button { width: 100%; padding: 15px; margin-top: 20px; border-radius: 12px; border: none; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: black; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
        #status { margin-top: 20px; font-size: 13px; color: #fbbf24; }
        textarea { width: 100%; height: 200px; margin-top: 20px; background: #010409; color: #7ee787; border: 1px solid #30363d; padding: 15px; border-radius: 10px; font-family: monospace; display: none; resize: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎙️ Whisper SRT Master</h2>
    <p>Auto-Rotation Keys Enabled (၇ ခု ပါဝင်သည်)</p>

    <div class="upload-box" onclick="document.getElementById('audioFile').click()">
        <span id="fileName">အသံဖိုင် ရွေးချယ်ရန် နှိပ်ပါ</span>
        <input type="file" id="audioFile" accept="audio/*" style="display:none" onchange="showName()">
    </div>

    <button id="runBtn" onclick="startTranscription()">စာသား စတင်ထုတ်ယူမည်</button>
    
    <div id="status">အဆင်သင့်ဖြစ်ပါပြီ</div>
    <textarea id="result" readonly></textarea>
</div>

<script>
    // သင်ပေးထားတဲ့ Key တွေကို အကာအကွယ်နဲ့ ထည့်ထားပါတယ်
    const rawKeys = [
        "R3NrXzJ4ZWlBU1I3S041NG9HZE9tVFZDV0dyeWIzRllQM1RXbm1INEx5RjBMNjhENlZYcnVJZWUK",
        "R3NrX1JyVHhKWWptSmJpSlBsdjhLZDd5V0dyeWIzRlk5ZEVRc3I5ZFI5VE1BWldQaUZhMHFiM2QK",
        "R3NrX0FCb2IxM2t1RjhNTUgwN2xaNVJOV0dyeWIzRlk0QmJ2S2I1MHAxQmRnaVN4bHJ1THhKUnIK",
        "R3NrX2pPSVdkcFpjSmpJbGNrSUs0ZWZzV0dyeWIzRll5NGlvYXZqTU1HOGdQdkNEVjhMU1VZWHYK",
        "R3NrXzhrc1p4MHlidUZ4ejVTMmdSWWhWV0dyeWIzRllhM1BzZnNhNnNVb1B3NnBaU2htclFEWlIK",
        "R3NrXzJrSlk4N3E2SUFlemVqOG1mSzRWV0dyeWIzRllqZGtZa2oxTHpWemJmYlpVMFBqNmIwZmEK",
        "R3NrX2wzOWNtaWNmU3c3Mjg0RFh4MEJrV0dyeWIzRllScEFJZXhtZ05FUkRaWjkzdFlwOHRJNTUK"
    ];

    const apiKeys = rawKeys.map(k => atob(k).trim());

    function showName() {
        const file = document.getElementById('audioFile').files[0];
        if(file) document.getElementById('fileName').innerText = file.name;
    }

    async function startTranscription() {
        const file = document.getElementById('audioFile').files[0];
        if (!file) return alert("ဖိုင်အရင်ရွေးပါ");

        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const textarea = document.getElementById('result');

        btn.disabled = true;
        textarea.style.display = "none";

        let success = false;
        for (let i = 0; i < apiKeys.length; i++) {
            status.innerText = `Key (${i + 1}/${apiKeys.length}) ဖြင့် စာသားထုတ်နေသည်...`;
            try {
                const srt = await getTranscription(file, apiKeys[i]);
                textarea.value = srt;
                textarea.style.display = "block";
                status.innerText = "အောင်မြင်စွာ ပြီးစီးပါပြီ!";
                success = true;
                break;
            } catch (err) {
                console.log(`Key ${i+1} failed`);
            }
        }

        if (!success) status.innerText = "Error: Key အားလုံး Limit ပြည့်သွားပါပြီ။";
        btn.disabled = false;
    }

    async function getTranscription(file, key) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("model", "whisper-large-v3");
        formData.append("response_format", "verbose_json");
        formData.append("temperature", "0");

        const res = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${key}` },
            body: formData
        });

        const data = await res.json();
        if (!res.ok) throw new Error("Fail");

        let srt = "";
        data.segments.forEach((s, i) => {
            srt += `${i+1}\n${formatTime(s.start)} --> ${formatTime(s.end)}\n${s.text.trim()}\n\n`;
        });
        return srt;
    }

    function formatTime(seconds) {
        const date = new Date(seconds * 1000);
        const hh = String(date.getUTCHours()).padStart(2, '0');
        const mm = String(date.getUTCMinutes()).padStart(2, '0');
        const ss = String(date.getUTCSeconds()).padStart(2, '0');
        const ms = String(date.getUTCMilliseconds()).padStart(3, '0');
        return `${hh}:${mm}:${ss},${ms}`;
    }
</script>

</body>
</html>
