<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI စာတန်းထိုး ပညာရှင် Pro (Gemini Full Flash)</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.15/dist/ffmpeg.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.2/dist/util.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Padauk:wght@400;700&display=swap');

        :root {
            --background: #0d1117;
            --foreground: #e8e8e8;
            --card: #1e2530;
            --card-foreground: #e8e8e8;
            --accent: #00d9ff;
            --accent-foreground: #0d1117;
            --border: #30363d;
            --muted: #2d333b;
            --muted-foreground: #8b949e;
            --destructive: #f85149;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: 'Inter', 'Padauk', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            background-color: rgba(20, 21, 26, 0.5);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg {
            width: 1.5rem;
            height: 1.5rem;
            color: var(--accent);
        }

        .header-text h1 {
            font-family: 'Poppins', 'Padauk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .header-text p {
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }

        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 217, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
        }

        .card h2 {
            font-family: 'Poppins', 'Padauk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--foreground);
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 0.75rem;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: var(--foreground);
            font-family: 'Inter', 'Padauk', sans-serif;
            font-size: 0.875rem;
        }

        .input-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted-foreground);
            cursor: pointer;
            padding: 0.5rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-family: 'Inter', 'Padauk', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            width: 100%;
            background-color: var(--accent);
            color: var(--accent-foreground);
            margin-bottom: 0.75rem;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #00b8d4;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            width: 100%;
            background-color: transparent;
            color: var(--foreground);
            border: 1px solid var(--border);
            margin-bottom: 0.75rem;
        }

        .status-message {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .status-message.info { background-color: rgba(0, 217, 255, 0.1); border: 1px solid rgba(0, 217, 255, 0.3); color: var(--accent); }
        .status-message.success { background-color: rgba(0, 200, 100, 0.1); border: 1px solid rgba(0, 200, 100, 0.3); color: #00c864; }
        .status-message.error { background-color: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.3); color: var(--destructive); }

        .progress-bar {
            width: 100%;
            height: 0.5rem;
            background-color: var(--muted);
            border-radius: 9999px;
            overflow: hidden;
            margin-top: 0.75rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #00b8d4);
            transition: width 0.3s ease;
        }

        .file-info {
            padding: 0.75rem;
            background-color: rgba(0, 217, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 0.5rem;
            margin-top: 0.75rem;
        }

        .video-preview {
            width: 100%;
            max-height: 24rem;
            background-color: #000;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }

        .subtitle-list {
            max-height: 24rem;
            overflow-y: auto;
        }

        .subtitle-item {
            padding: 1rem;
            background-color: rgba(0, 217, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .subtitle-time {
            font-size: 0.75rem;
            color: var(--muted-foreground);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .subtitle-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .subtitle-text {
            font-size: 0.875rem;
            padding: 0.75rem;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 0.375rem;
            min-height: 3rem;
            cursor: pointer;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <div class="header-text">
                <h1>AI စာတန်းထိုး ပညာရှင် Pro</h1>
                <p>Gemini API Flash Model အစုံဖြင့် အလိုအလျောက် စာတန်းထိုးခြင်း</p>
            </div>
        </div>
    </header>

    <main>
        <div class="grid">
            <div class="space-y-6">
                <div class="card fade-in">
                    <h2>Gemini API သတ်မှတ်ချက်</h2>
                    <div class="form-group">
                        <label>Gemini API Key</label>
                        <div class="input-wrapper">
                            <input type="password" id="geminiApiKey" placeholder="AIza...">
                            <button class="toggle-password" onclick="togglePassword('geminiApiKey')">👁️</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Gemini Model (Flash Variants အားလုံး)</label>
                        <select id="geminiModel">
                            <optgroup label="Gemini Flash Models">
                                <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                                <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                                <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite Preview</option>
                                <option value="gemini-1.5-flash-8b">Gemini 1.5 Flash 8B</option>
                            </optgroup>
                            <optgroup label="Gemini Pro Models">
                                <option value="gemini-pro">Gemini Pro</option>
                                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                <option value="gemini-2.0-pro">Gemini 2.0 Pro</option>
                                <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                            </optgroup>
                        </select>
                    </div>

                    <button class="btn-primary" onclick="saveApiKeys()">သိမ်းဆည်းရန်</button>
                    <p style="font-size: 0.75rem; color: var(--muted-foreground); margin-top: 1rem;">
                        API key ကို <a href="https://ai.google.dev" target="_blank" style="color: var(--accent);">Google AI Studio</a> တွင် အခမဲ့ ရယူနိုင်ပါသည်။
                    </p>
                </div>

                <div class="card fade-in" style="margin-top: 1.5rem;">
                    <h2>မီဒီယာ တင်ရန်</h2>
                    <input type="file" id="fileInput" accept="audio/*,video/*" style="display: none;">
                    <button class="btn-primary" onclick="document.getElementById('fileInput').click()">ဖိုင်ရွေးချယ်ရန်</button>
                    <div id="fileInfo"></div>
                </div>

                <div class="card fade-in" style="margin-top: 1.5rem;">
                    <h2>လုပ်ဆောင်ချက်များ</h2>
                    <button class="btn-primary" id="processBtn" onclick="handleFullProcess()">
                        စာသားပြောင်းပြီး မြန်မာပြန်ဆိုရန်
                    </button>
                    <button class="btn-primary" id="hardcodeBtn" onclick="handleHardcode()" disabled>
                        ဗီဒီယိုထဲသို့ ထည့်သွင်းရန် (Hardcode)
                    </button>
                </div>

                <div class="card fade-in" style="margin-top: 1.5rem; display: none;" id="downloadSection">
                    <h2>ဒေါင်းလုဒ် ရယူရန်</h2>
                    <button class="btn-secondary" onclick="downloadFile('original')">မူရင်း SRT</button>
                    <button class="btn-secondary" onclick="downloadFile('translated')">မြန်မာ SRT</button>
                    <button class="btn-secondary" id="downloadVideoBtn" onclick="downloadFile('video')" style="display: none;">စာတန်းထိုးပြီးသား ဗီဒီယို</button>
                </div>
            </div>

            <div>
                <div id="statusMessage"></div>
                <div class="card fade-in" id="videoPreviewCard" style="display: none;">
                    <h2>ဗီဒီယို အစမ်းကြည့်</h2>
                    <video id="videoPreview" class="video-preview" controls></video>
                </div>
                <div class="card fade-in" id="subtitleEditorCard" style="display: none; margin-top: 1.5rem;">
                    <h2>စာတန်းထိုး ပြင်ဆင်ရန်</h2>
                    <div class="subtitle-list" id="subtitleList"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let state = {
            geminiApiKey: '',
            geminiModel: 'gemini-2.5-flash',
            selectedFile: null,
            subtitles: [],
            originalSrt: '',
            translatedSrt: '',
            hardcodedVideoUrl: ''
        };

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files?.[0];
            if (file) {
                state.selectedFile = file;
                document.getElementById('fileInfo').innerHTML = `
                    <div class="file-info">
                        <p><strong>${file.name}</strong></p>
                        <p>${(file.size / 1024 / 1024).toFixed(2)} MB</p>
                    </div>
                `;
                const videoPreviewCard = document.getElementById('videoPreviewCard');
                videoPreviewCard.style.display = 'block';
                document.getElementById('videoPreview').src = URL.createObjectURL(file);
                showStatus('ဖိုင်တင်ပြီးပါပြီ', 'success');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            state.geminiApiKey = localStorage.getItem('geminiApiKey') || '';
            state.geminiModel = localStorage.getItem('geminiModel') || 'gemini-2.5-flash';
            document.getElementById('geminiApiKey').value = state.geminiApiKey;
            document.getElementById('geminiModel').value = state.geminiModel;
        });

        function saveApiKeys() {
            state.geminiApiKey = document.getElementById('geminiApiKey').value;
            state.geminiModel = document.getElementById('geminiModel').value;
            localStorage.setItem('geminiApiKey', state.geminiApiKey);
            localStorage.setItem('geminiModel', state.geminiModel);
            showStatus('သိမ်းဆည်းပြီးပါပြီ', 'success');
        }

        function togglePassword(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function showStatus(msg, type = 'info', progress = null) {
            const div = document.getElementById('statusMessage');
            div.innerHTML = `
                <div class="status-message ${type} fade-in">
                    <div>
                        <p>${msg}</p>
                        ${progress !== null ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>` : ''}
                    </div>
                </div>
            `;
        }

        async function handleFullProcess() {
            if (!state.selectedFile || !state.geminiApiKey) {
                showStatus('ဖိုင်နှင့် API Key ထည့်သွင်းပါ', 'error');
                return;
            }

            const btn = document.getElementById('processBtn');
            btn.disabled = true;
            
            try {
                showStatus('Gemini သို့ ဖိုင်ပေးပို့နေသည်...', 'info', 20);
                const base64Data = await fileToBase64(state.selectedFile);
                
                showStatus('Gemini မှ စာသားပြောင်းလဲပြီး ဘာသာပြန်နေသည်...', 'info', 50);

                const prompt = `Transcribe this audio and translate it to Burmese. 
                Return the result ONLY as a JSON array of objects with this structure: 
                [{"start": "00:00:01,000", "end": "00:00:04,000", "original": "Hello", "translated": "မင်္ဂလာပါ"}]
                Use SRT timestamp format (HH:MM:SS,mmm). Make the Burmese translation natural.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${state.geminiModel}:generateContent?key=${state.geminiApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: state.selectedFile.type, data: base64Data } }
                            ]
                        }],
                        generationConfig: { response_mime_type: "application/json" }
                    })
                });

                if (!response.ok) throw new Error('Gemini API Error');

                const data = await response.json();
                const resultText = data.candidates[0].content.parts[0].text;
                const parsedSubtitles = JSON.parse(resultText);

                state.subtitles = parsedSubtitles.map((s, i) => ({
                    id: i + 1,
                    startTime: s.start,
                    endTime: s.end,
                    originalText: s.original,
                    translatedText: s.translated
                }));

                state.originalSrt = generateSRT(state.subtitles, false);
                state.translatedSrt = generateSRT(state.subtitles, true);

                renderSubtitles();
                document.getElementById('subtitleEditorCard').style.display = 'block';
                document.getElementById('downloadSection').style.display = 'block';
                document.getElementById('hardcodeBtn').disabled = false;
                showStatus('အောင်မြင်စွာ လုပ်ဆောင်ပြီးပါပြီ', 'success', 100);

            } catch (err) {
                console.error(err);
                showStatus('အမှားဖြစ်သွားပါသည်: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        async function handleHardcode() {
            const btn = document.getElementById('hardcodeBtn');
            btn.disabled = true;
            try {
                showStatus('ဗီဒီယို ထုတ်လုပ်နေသည် (FFmpeg)...', 'info', 30);
                const { FFmpeg } = window.FFmpeg;
                const ffmpeg = new FFmpeg();
                await ffmpeg.load();

                const videoData = await state.selectedFile.arrayBuffer();
                await ffmpeg.writeFile('input.mp4', new Uint8Array(videoData));
                
                const srtData = new TextEncoder().encode(state.translatedSrt);
                await ffmpeg.writeFile('sub.srt', srtData);

                await ffmpeg.exec([
                    '-i', 'input.mp4',
                    '-vf', "subtitles=sub.srt:force_style='FontSize=20,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,BorderStyle=1,Outline=1'",
                    '-c:a', 'copy',
                    'output.mp4'
                ]);

                const data = await ffmpeg.readFile('output.mp4');
                state.hardcodedVideoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                document.getElementById('downloadVideoBtn').style.display = 'block';
                showStatus('ဗီဒီယို အဆင်သင့်ဖြစ်ပါပြီ', 'success', 100);
            } catch (err) {
                showStatus('Hardcode လုပ်၍မရပါ', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        function generateSRT(subs, translated) {
            return subs.map(s => `${s.id}\n${s.startTime} --> ${s.endTime}\n${translated ? s.translatedText : s.originalText}\n`).join('\n');
        }

        function renderSubtitles() {
            const list = document.getElementById('subtitleList');
            list.innerHTML = state.subtitles.map(s => `
                <div class="subtitle-item">
                    <div class="subtitle-time"><span>${s.startTime} → ${s.endTime}</span><span>#${s.id}</span></div>
                    <div class="subtitle-grid">
                        <div class="subtitle-text">${s.originalText}</div>
                        <div class="subtitle-text" onclick="editSub(${s.id})">${s.translatedText}</div>
                    </div>
                </div>
            `).join('');
        }

        function editSub(id) {
            const sub = state.subtitles.find(s => s.id === id);
            const newText = prompt('ပြင်ဆင်ရန်:', sub.translatedText);
            if (newText) {
                sub.translatedText = newText;
                state.translatedSrt = generateSRT(state.subtitles, true);
                renderSubtitles();
            }
        }

        function downloadFile(type) {
            let content, name;
            if (type === 'original') { content = state.originalSrt; name = 'original.srt'; }
            else if (type === 'translated') { content = state.translatedSrt; name = 'translated_mm.srt'; }
            else if (type === 'video') { window.open(state.hardcodedVideoUrl); return; }

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
        }
    </script>
</body>
</html>
