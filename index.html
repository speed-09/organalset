<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>AI Subtitle Studio Pro</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }
    input, select, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    textarea {
      width: 90%;
      height: 200px;
      margin-top: 15px;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>🎬 AI Subtitle Studio Pro</h1>

<input type="text" id="videoUrl" placeholder="Paste video/audio URL" size="50"/><br>

<select id="style">
  <option value="formal">Formal</option>
  <option value="casual">Casual</option>
  <option value="tiktok">TikTok Style</option>
</select><br>

<button onclick="startProcess()">🚀 Start Process</button>

<h3>📄 Output</h3>
<textarea id="output"></textarea><br>

<button onclick="generateVoice()">🔊 Generate Voice</button>

<script>
async function startProcess() {
  const url = document.getElementById("videoUrl").value;
  const style = document.getElementById("style").value;

  document.getElementById("output").value = "⏳ Processing...";

  try {
    // 1. Speech → Text
    const t1 = await fetch("http://localhost:3000/api/transcribe", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ audioUrl: url })
    });
    const d1 = await t1.json();

    // 2. Translate
    const t2 = await fetch("http://localhost:3000/api/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        text: d1.text,
        style: style
      })
    });
    const d2 = await t2.json();

    document.getElementById("output").value = d2.result;

  } catch (err) {
    document.getElementById("output").value = "❌ Error: " + err.message;
  }
}

async function generateVoice() {
  const text = document.getElementById("output").value;

  const res = await fetch("http://localhost:3000/api/tts", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  const audio = new Audio(url);
  audio.play();
}
</script>

</body>
</html>
