<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Master (Key Verify)</title>
    <style>
        :root { --accent: #00f2fe; --bg: #0d1117; --card: #161b22; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #30363d; width: 100%; max-width: 700px; }
        h2 { color: var(--accent); text-align: center; margin-top: 0; }
        .key-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        label { font-size: 12px; color: #8b949e; display: block; margin-bottom: 5px; }
        textarea.keys { width: 100%; height: 80px; background: #010409; color: #ccc; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-size: 11px; resize: none; box-sizing: border-box; }
        .verify-btn { background: #30363d; color: white; padding: 8px; font-size: 11px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 15px; width: 100%; }
        .verify-btn:hover { background: #444; }
        .upload-area { border: 2px dashed #30363d; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        #runBtn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: black; font-weight: bold; cursor: pointer; }
        #runBtn:disabled { background: #333; color: #666; }
        #status { text-align: center; margin: 15px 0; font-size: 14px; color: #fbbf24; }
        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        textarea.output { width: 100%; height: 300px; background: #010409; color: #7ee787; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; display: none; }
        .valid { color: #2ea043; font-size: 11px; }
        .invalid { color: #da3633; font-size: 11px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎙️ AI Subtitle Master</h2>

    <div class="key-section">
        <div>
            <label>Whisper Keys</label>
            <textarea id="wKeysInput" class="keys" placeholder="gsk_xxxx..."></textarea>
            <div id="wStatus"></div>
        </div>
        <div>
            <label>Gemini Keys</label>
            <textarea id="gKeysInput" class="keys" placeholder="AIzaxxxx..."></textarea>
            <div id="gStatus"></div>
        </div>
    </div>
    
    <button class="verify-btn" onclick="verifyKeys()">Key များ စစ်ဆေးမည် (Verify Keys)</button>

    <div class="upload-area" onclick="document.getElementById('audioFile').click()">
        <span id="fileLabel">အသံဖိုင် ရွေးချယ်ပါ</span>
        <input type="file" id="audioFile" accept="audio/*" style="display:none" onchange="document.getElementById('fileLabel').innerText=this.files[0].name">
    </div>

    <button id="runBtn" onclick="processAll()" disabled>စာသားထုတ်ပြီး မြန်မာပြန်မည်</button>
    
    <div id="status">အရင်ဆုံး Key Verify လုပ်ပေးပါ</div>

    <div class="results">
        <textarea id="engOut" class="output" readonly></textarea>
        <textarea id="mmOut" class="output" readonly></textarea>
    </div>
</div>

<script>
    let keysVerified = false;

    async function verifyKeys() {
        const wKeys = document.getElementById('wKeysInput').value.trim().split('\n').filter(k => k.trim());
        const gKeys = document.getElementById('gKeysInput').value.trim().split('\n').filter(k => k.trim());

        if (wKeys.length === 0 || gKeys.length === 0) return alert("Key များ ထည့်ပေးပါ");

        document.getElementById('wStatus').innerHTML = "စစ်ဆေးနေသည်...";
        document.getElementById('gStatus').innerHTML = "စစ်ဆေးနေသည်...";

        // Verify Whisper Key (Check first one)
        const wValid = await checkWhisper(wKeys[0].trim());
        // Verify Gemini Key (Check first one)
        const gValid = await checkGemini(gKeys[0].trim());

        document.getElementById('wStatus').innerHTML = wValid ? "<span class='valid'>✅ Whisper Key အိုကေသည်</span>" : "<span class='invalid'>❌ Whisper Key မှားနေသည်</span>";
        document.getElementById('gStatus').innerHTML = gValid ? "<span class='valid'>✅ Gemini Key အိုကေသည်</span>" : "<span class='invalid'>❌ Gemini Key မှားနေသည်</span>";

        if (wValid && gValid) {
            keysVerified = true;
            document.getElementById('runBtn').disabled = false;
            document.getElementById('status').innerText = "Key များ အိုကေပါသည်။ ဖိုင်ရွေးပြီး စတင်နိုင်ပါပြီ။";
        }
    }

    async function checkWhisper(key) {
        try {
            const res = await fetch("https://api.groq.com/openai/v1/models", {
                headers: {"Authorization": `Bearer ${key}`}
            });
            return res.ok;
        } catch (e) { return false; }
    }

    async function checkGemini(key) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            return res.ok;
        } catch (e) { return false; }
    }

    async function processAll() {
        if (!keysVerified) return alert("Key Verify အရင်လုပ်ပါ");
        const file = document.getElementById('audioFile').files[0];
        if (!file) return alert("ဖိုင်ရွေးပါ");

        const wKeysRaw = document.getElementById('wKeysInput').value.trim().split('\n').filter(k => k.trim());
        const gKeysRaw = document.getElementById('gKeysInput').value.trim().split('\n').filter(k => k.trim());

        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        btn.disabled = true;

        status.innerText = "အဆင့် (၁) - Whisper ဖြင့် စာသားထုတ်နေသည်...";
        let engSrt = "";
        for (let k of wKeysRaw) {
            try {
                engSrt = await getWhisper(file, k.trim());
                if (engSrt) break;
            } catch (e) {}
        }

        if (!engSrt) {
            status.innerText = "Whisper Error တက်နေပါသည်။";
            btn.disabled = false; return;
        }

        document.getElementById('engOut').value = engSrt;
        document.getElementById('engOut').style.display = "block";

        status.innerText = "အဆင့် (၂) - Gemini ဖြင့် မြန်မာပြန်နေသည်...";
        let mmSrt = "";
        for (let k of gKeysRaw) {
            try {
                mmSrt = await getGemini(engSrt, k.trim());
                if (mmSrt) break;
            } catch (e) {}
        }

        if (mmSrt) {
            document.getElementById('mmOut').value = mmSrt;
            document.getElementById('mmOut').style.display = "block";
            status.innerText = "အားလုံး ပြီးစီးပါပြီ!";
        }
        btn.disabled = false;
    }

    async function getWhisper(file, key) {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("model", "whisper-large-v3");
        fd.append("response_format", "verbose_json");
        const res = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
            method: "POST",
            headers: {"Authorization": `Bearer ${key}`},
            body: fd
        });
        const data = await res.json();
        let srt = "";
        data.segments.forEach((s, i) => {
            srt += `${i+1}\n${formatTime(s.start)} --> ${formatTime(s.end)}\n${s.text.trim()}\n\n`;
        });
        return srt;
    }

    async function getGemini(text, key) {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ contents: [{ parts: [{ text: "Translate to Myanmar SRT:\n\n" + text }] }] })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    function formatTime(s) {
        const d = new Date(s * 1000);
        const pad = (n, l=2) => String(n).padStart(l, '0');
        return `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())},${pad(d.getUTCMilliseconds(), 3)}`;
    }
</script>

</body>
</html>
