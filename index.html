<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SRT Master Pro (Groq + Gemini)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .input-style { background: #1e293b; border: 1px solid #475569; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; }
        .btn-groq { background: linear-gradient(90deg, #2563eb, #3b82f6); }
        .btn-gemini { background: linear-gradient(90deg, #8b5cf6, #d946ef); }
        .progress-bar { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .progress-inner { height: 100%; width: 0%; background: #10b981; transition: 0.3s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl">
        <h1 class="text-2xl font-bold text-center mb-6 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
            AI SRT Master Pro
        </h1>

        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1">API Key (Groq or Gemini)</label>
                <input type="password" id="apiKey" placeholder="Paste your API Key here" class="input-style text-sm">
            </div>

            <div>
                <label class="block text-xs text-gray-400 mb-1">Select Media (MP3, MP4, etc.)</label>
                <input type="file" id="mediaFile" accept="audio/*,video/*" class="input-style text-sm">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="processAI('groq')" class="btn-groq p-3 rounded-xl font-bold text-sm shadow-lg hover:opacity-80 transition">Use Groq<br><span class="text-[10px] font-normal">(Fast & < 25MB)</span></button>
                <button onclick="processAI('gemini')" class="btn-gemini p-3 rounded-xl font-bold text-sm shadow-lg hover:opacity-80 transition">Use Gemini<br><span class="text-[10px] font-normal">(Large Files)</span></button>
            </div>

            <div id="statusBox" class="hidden mt-4 p-4 bg-slate-900/50 rounded-xl border border-slate-700">
                <div class="flex justify-between text-xs mb-1">
                    <span id="statusMsg" class="text-blue-300">Processing...</span>
                    <span id="timer">0s</span>
                </div>
                <div class="progress-bar">
                    <div id="progressInner" class="progress-inner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let timerInterval;
        
        function formatSRT(seconds) {
            let date = new Date(0);
            date.setSeconds(seconds);
            return date.toISOString().substr(11, 8) + "," + Math.floor((seconds % 1) * 1000).toString().padStart(3, '0');
        }

        async function processAI(provider) {
            const key = document.getElementById('apiKey').value.trim();
            const fileInput = document.getElementById('mediaFile');
            if (!key || !fileInput.files[0]) return alert("Key နှင့် File ထည့်ပေးပါ။");

            const file = fileInput.files[0];
            const statusBox = document.getElementById('statusBox');
            const msg = document.getElementById('statusMsg');
            const bar = document.getElementById('progressInner');
            
            // Start UI
            statusBox.classList.remove('hidden');
            msg.innerText = `Connecting to ${provider.toUpperCase()}...`;
            bar.style.width = "20%";

            if (provider === 'groq') {
                if (file.size > 25 * 1024 * 1024) return alert("Groq အတွက် 25MB အောက်ဖိုင်ပဲ သုံးပါ။");
                await runGroq(key, file);
            } else {
                alert("Gemini Integration အတွက် Server-side ပြင်ဆင်မှု လိုအပ်ပါသည်။ လက်ရှိ Groq အရင် စမ်းသပ်ကြည့်ပါ။");
                // Gemini ကို Client-side ကနေ တိုက်ရိုက်ခေါ်ဖို့က Content-Type ကန့်သတ်ချက်ရှိလို့ 
                // ဒီနေရာမှာ Groq နဲ့ပဲ အဓိက နမူနာပြထားပါတယ်။
            }
        }

        async function runGroq(key, file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("model", "whisper-large-v3");
            formData.append("response_format", "verbose_json");

            try {
                const res = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}` },
                    body: formData
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error.message);

                let srt = "";
                data.segments.forEach((seg, i) => {
                    srt += `${i + 1}\n${formatSRT(seg.start)} --> ${formatSRT(seg.end)}\n${seg.text.trim()}\n\n`;
                });

                downloadSRT(srt, file.name);
                document.getElementById('statusMsg').innerText = "✅ Done!";
                document.getElementById('progressInner').style.width = "100%";
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        function downloadSRT(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename.split('.')[0] + ".srt";
            a.click();
        }
    </script>
</body>
</html>
