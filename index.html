<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Transcriber - Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-cyan-400 mb-6 text-center">🎙️ Whisper SRT Tool</h1>

        <div class="space-y-4">
            <div>
                <label class="block text-xs text-slate-500 mb-1 uppercase tracking-widest">Groq API Key</label>
                <input type="password" id="apiKey" placeholder="gsk_..." 
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-cyan-500">
                <p class="text-[10px] text-slate-500 mt-1">* Key ကို GitHub က မပိတ်အောင် ကိုယ်တိုင်ထည့်ပေးရပါမယ်။</p>
            </div>

            <div class="border-2 border-dashed border-slate-700 rounded-xl p-6 text-center">
                <input type="file" id="audioFile" accept="audio/*" class="hidden">
                <label for="audioFile" class="cursor-pointer block">
                    <span class="text-3xl block mb-2">📁</span>
                    <span id="fileName" class="text-sm text-slate-400">MP3 ဖိုင် ရွေးချယ်ပါ</span>
                </label>
            </div>

            <button onclick="startTranscribe()" id="btn" class="w-full bg-cyan-600 py-3 rounded-lg font-bold hover:bg-cyan-500 transition-all">
                TRANSCRIPTION စတင်မည်
            </button>
        </div>

        <div id="loading" class="hidden mt-6 space-y-2">
            <div class="flex justify-between text-xs font-mono text-cyan-400">
                <span id="status">Processing...</span>
                <span id="timer">00:00</span>
            </div>
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="bar" class="bg-cyan-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('audioFile').onchange = (e) => {
            if(e.target.files[0]) document.getElementById('fileName').innerText = e.target.files[0].name;
        };

        async function startTranscribe() {
            const key = document.getElementById('apiKey').value;
            const file = document.getElementById('audioFile').files[0];
            
            if(!key || !file) return alert("Key နှင့် File နှစ်ခုလုံး လိုအပ်ပါသည်။");

            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const bar = document.getElementById('bar');
            
            btn.disabled = true;
            loading.classList.remove('hidden');
            
            try {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("model", "whisper-large-v3");
                formData.append("response_format", "verbose_json");

                bar.style.width = "40%";
                document.getElementById('status').innerText = "Uploading to Groq...";

                const response = await fetch("https://corsproxy.io/?https://api.groq.com/openai/v1/audio/transcriptions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}` },
                    body: formData
                });

                if(!response.ok) throw new Error("Key အမှား သို့မဟုတ် Limit ပြည့်နေပါသည်။");

                const data = await response.json();
                bar.style.width = "100%";
                document.getElementById('status').innerText = "Done!";

                // Generate SRT
                let srt = "";
                data.segments.forEach((s, i) => {
                    const format = (t) => new Date(t * 1000).toISOString().substr(11, 12).replace('.', ',');
                    srt += `${i+1}\n${format(s.start)} --> ${format(s.end)}\n${s.text.trim()}\n\n`;
                });

                // Download
                const blob = new Blob([srt], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = file.name.replace(/\.[^/.]+$/, "") + ".srt";
                a.click();

            } catch (err) {
                alert(err.message);
                document.getElementById('status').innerText = "Error!";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
