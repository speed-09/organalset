<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Whisper Transcriber - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #e2e8f0; }
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .status-animate { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                Whisper SRT Master
            </h1>
            <p class="text-slate-400 text-sm mt-2">GitHub Pages Compatible Version</p>
        </div>

        <div class="space-y-6">
            <div class="relative border-2 border-dashed border-slate-700 rounded-xl p-6 text-center hover:border-cyan-500 transition-colors">
                <input type="file" id="audioFile" accept="audio/mpeg, audio/mp3" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <div class="space-y-2">
                    <span class="text-4xl">🎵</span>
                    <p id="fileName" class="text-slate-300 font-medium">MP3 ဖိုင်ကို ရွေးချယ်ပါ</p>
                    <p class="text-slate-500 text-[10px]">Max size: 25MB (Groq Limit)</p>
                </div>
            </div>

            <button onclick="processAudio()" id="mainBtn" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95">
                စတင်ပြောင်းလဲမည်
            </button>
        </div>

        <div id="progressSection" class="hidden mt-8 space-y-4">
            <div class="flex justify-between items-end">
                <div class="space-y-1">
                    <p id="statusLabel" class="text-cyan-400 text-sm font-semibold status-animate">Connecting...</p>
                    <p id="keyTag" class="text-[10px] text-slate-500 font-mono"></p>
                </div>
                <p id="stopwatch" class="text-xl font-mono text-slate-300">00:00</p>
            </div>
            <div class="h-3 w-full bg-slate-800 rounded-full overflow-hidden">
                <div id="bar" class="progress-bar h-full bg-gradient-to-r from-cyan-500 to-blue-500 w-0"></div>
            </div>
        </div>

        <div id="outputArea" class="hidden mt-6">
            <textarea id="srtPreview" class="w-full h-48 bg-black border border-slate-700 rounded-lg p-4 text-xs font-mono text-green-500 focus:outline-none" readonly></textarea>
            <p class="text-center text-slate-500 text-[10px] mt-2 italic">SRT ကို အလိုအလျောက် Download ဆွဲပေးပါမည်။</p>
        </div>
    </div>

    <script>
        const API_KEYS = [
            "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",
            "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",
            "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",
            "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",
            "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",
            "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",
            "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"
        ];

        let keyIndex = 0;
        let timerId;

        document.getElementById('audioFile').addEventListener('change', (e) => {
            if(e.target.files[0]) document.getElementById('fileName').innerText = e.target.files[0].name;
        });

        function formatSRTTime(s) {
            const date = new Date(s * 1000);
            const hh = date.getUTCHours().toString().padStart(2, '0');
            const mm = date.getUTCMinutes().toString().padStart(2, '0');
            const ss = date.getUTCSeconds().toString().padStart(2, '0');
            const ms = Math.floor((s % 1) * 1000).toString().padStart(3, '0');
            return `${hh}:${mm}:${ss},${ms}`;
        }

        async function processAudio() {
            const file = document.getElementById('audioFile').files[0];
            if(!file) return alert("ဖိုင်အရင်ရွေးပါ!");

            const btn = document.getElementById('mainBtn');
            const bar = document.getElementById('bar');
            const statusLabel = document.getElementById('statusLabel');
            const progressSection = document.getElementById('progressSection');
            
            btn.disabled = true;
            progressSection.classList.remove('hidden');
            
            let sec = 0;
            timerId = setInterval(() => {
                sec++;
                document.getElementById('stopwatch').innerText = 
                    `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
            }, 1000);

            try {
                const currentKey = API_KEYS[keyIndex];
                document.getElementById('keyTag').innerText = `Key Active: Slot ${keyIndex + 1}`;
                keyIndex = (keyIndex + 1) % API_KEYS.length;

                bar.style.width = "20%";
                statusLabel.innerText = "Bypassing CORS & Uploading...";

                const formData = new FormData();
                formData.append("file", file);
                formData.append("model", "whisper-large-v3");
                formData.append("response_format", "verbose_json");

                // --- GitHub Pages အတွက် CORS Proxy သုံးထားသော Fetch ---
                const response = await fetch("https://corsproxy.io/?https://api.groq.com/openai/v1/audio/transcriptions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${currentKey}` },
                    body: formData
                });

                if(!response.ok) throw new Error("API Limit သို့မဟုတ် Key ပျက်နေပါသည်။");

                bar.style.width = "70%";
                statusLabel.innerText = "Processing Text...";
                
                const data = await response.json();
                
                let srt = "";
                data.segments.forEach((seg, i) => {
                    srt += `${i+1}\n${formatSRTTime(seg.start)} --> ${formatSRTTime(seg.end)}\n${seg.text.trim()}\n\n`;
                });

                document.getElementById('srtPreview').value = srt;
                bar.style.width = "100%";
                statusLabel.innerText = "Success!";
                document.getElementById('outputArea').classList.remove('hidden');
                
                downloadFile(srt, file.name.replace(".mp3", ".srt"));

            } catch (err) {
                alert("Error: " + err.message + "\n(CORS Proxy ခေတ္တပိတ်နေတာမျိုးလည်း ဖြစ်နိုင်ပါတယ်)");
                statusLabel.innerText = "Error Occurred";
            } finally {
                clearInterval(timerId);
                btn.disabled = false;
            }
        }

        function downloadFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }
    </script>
</body>
</html>
