<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper SRT Master - Auto Rotation</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0d1117; --card: #161b22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #8b949e; }
        input[type="file"], button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; font-size: 15px; }
        button { background: #238636; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2ea043; }
        #dlBtn { background: #0ea5e9; display: none; margin-top: 10px; }
        .progress-bar { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; display: none; margin-bottom: 10px; }
        .fill { width: 0%; height: 100%; background: var(--primary); transition: 0.4s; }
        #status { text-align: center; font-size: 14px; margin: 10px 0; color: #fbbf24; }
        textarea { width: 100%; height: 280px; background: #010409; color: #7ee787; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-family: monospace; display: none; line-height: 1.6; }
        .key-info { font-size: 11px; color: #484f58; text-align: right; margin-top: -10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎙️ Whisper SRT Master</h2>
    
    <label>အသံဖိုင် ရွေးချယ်ပါ (MP3, WAV, etc.)</label>
    <input type="file" id="audioFile" accept="audio/*">

    <button id="runBtn" onclick="generateSRT()">SRT စတင်ထုတ်ယူမည်</button>
    
    <div class="progress-bar" id="pBar"><div class="fill" id="pFill"></div></div>
    <div id="status">အသင့်ဖြစ်ပါပြီ</div>
    <div class="key-info" id="keyTag">Auto-rotation Active</div>
    
    <textarea id="output" readonly spellcheck="false"></textarea>
    <button id="dlBtn" onclick="downloadSrt()">📥 SRT ဖိုင်ကို သိမ်းဆည်းမည်</button>
</div>

<script>
    // သင်ပေးထားတဲ့ API Keys များကို အလှည့်ကျသုံးရန် Array ထဲထည့်ထားခြင်း
    const apiKeys = [
        "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",
        "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",
        "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",
        "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",
        "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",
        "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",
        "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",
        "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"
    ];

    let currentKeyIndex = 0;

    async function generateSRT() {
        const file = document.getElementById('audioFile').files[0];
        if (!file) return alert("ဖိုင်အရင်ရွေးပါ");

        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const pBar = document.getElementById('pBar');
        const pFill = document.getElementById('pFill');
        const output = document.getElementById('output');
        const dlBtn = document.getElementById('dlBtn');

        btn.disabled = true;
        pBar.style.display = 'block';
        output.style.display = 'none';
        dlBtn.style.display = 'none';
        status.innerText = "စတင်နေပါပြီ... (Key #" + (currentKeyIndex + 1) + " ကိုသုံးနေသည်)";
        pFill.style.width = "30%";

        const formData = new FormData();
        formData.append("file", file);
        formData.append("model", "whisper-large-v3");
        formData.append("response_format", "verbose_json");

        try {
            const response = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${apiKeys[currentKeyIndex]}` },
                body: formData
            });

            const data = await response.json();

            // Rate Limit သို့မဟုတ် Error ဖြစ်လျှင် နောက် Key တစ်ခုသို့ ပြောင်းရန်
            if (!response.ok) {
                if (currentKeyIndex < apiKeys.length - 1) {
                    currentKeyIndex++;
                    status.innerText = "Limit ပြည့်သွားသဖြင့် Key အသစ်ဖြင့် ထပ်မံကြိုးစားနေသည်...";
                    return generateSRT(); 
                } else {
                    throw new Error(data.error?.message || "Keys အားလုံး Limit ပြည့်သွားပါပြီ။");
                }
            }
