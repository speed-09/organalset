<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper SRT Master - Original Standard</title>
    <style>
        :root { 
            --primary: #00f2fe; 
            --bg: #0d1117; 
            --card: #161b22; 
            --text: #c9d1d9;
            --success: #238636;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            margin: 0;
        }

        .container { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid #30363d;
            width: 100%; 
            max-width: 500px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; }
        
        .file-box {
            border: 2px dashed #30363d;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        input[type="file"] { width: 100%; color: #8b949e; }

        button { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-bottom: 10px;
        }

        #runBtn { background: var(--success); color: white; }
        #runBtn:hover { background: #2ea043; }
        #runBtn:disabled { background: #21262d; cursor: not-allowed; }

        #dlBtn { background: #0ea5e9; color: white; display: none; }

        .status-area { text-align: center; margin: 15px 0; font-size: 14px; }
        #status { color: #fbbf24; }

        textarea { 
            width: 100%; height: 250px; background: #010409; color: #7ee787; 
            border: 1px solid #30363d; padding: 15px; border-radius: 10px; 
            font-family: 'Courier New', monospace; display: none;
            resize: none; box-sizing: border-box; margin-top: 15px;
        }

        .progress { height: 4px; background: #21262d; width: 100%; display: none; border-radius: 2px; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎙️ Whisper SRT Master</h2>
    
    <div class="file-box">
        <input type="file" id="audioFile" accept="audio/*">
    </div>

    <button id="runBtn" onclick="processAudio()">SRT စတင်ထုတ်ယူမည်</button>
    
    <div class="progress" id="pBar"><div class="progress-fill" id="pFill"></div></div>
    
    <div class="status-area">
        <div id="status">Ready</div>
    </div>
    
    <textarea id="output" readonly></textarea>
    <button id="dlBtn" onclick="downloadSrt()">📥 SRT ဖိုင်ကို သိမ်းဆည်းမည်</button>
</div>

<script>
    // API Keys Rotation List
    const keys = [
        "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",
        "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",
        "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",
        "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",
        "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",
        "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",
        "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"
    ];

    let currentKeyIdx = 0;

    async function processAudio() {
        const file = document.getElementById('audioFile').files[0];
        if (!file) return alert("ဖိုင်ရွေးပါ");

        const runBtn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const pBar = document.getElementById('pBar');
        const pFill = document.getElementById('pFill');
        const output = document.getElementById('output');
        const dlBtn = document.getElementById('dlBtn');

        runBtn.disabled = true;
        pBar.style.display = 'block';
        pFill.style.width = '20%';
        output.style.display = 'none';
        dlBtn.style.display = 'none';
        status.innerText = "Transcribing... (Key Rotation Active)";

        // Try keys one by one if error occurs
        let success = false;
        for (let i = 0; i < keys.length; i++) {
            const currentKey = keys[currentKeyIdx];
            try {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("model", "whisper-large-v3");
                formData.append("response_format", "verbose_json");

                const response = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${currentKey}` },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    const srt = formatToSRT(data.segments);
                    output.value = srt;
                    output.style.display = 'block';
                    dlBtn.style.display = 'block';
                    status.innerText = "Success!";
                    pFill.style.width = '100%';
                    success = true;
                    break; 
                } else {
                    console.error(`Key ${currentKeyIdx} failed. Moving to next.`);
                    currentKeyIdx = (currentKeyIdx + 1) % keys.length;
                }
            } catch (e) {
                currentKeyIdx = (currentKeyIdx + 1) % keys.length;
            }
        }

        if (!success) {
            status.innerText = "Error: All keys exhausted or network error.";
        }
        runBtn.disabled = false;
    }

    // Original SRT Formatting Logic
    function formatToSRT(segments) {
        return segments.map((s, index) => {
            const start = formatSRTTime(s.start);
            const end = formatSRTTime(s.end);
            return `${index + 1}\n${start} --> ${end}\n${s.text.trim()}\n`;
        }).join('\n');
    }

    function formatSRTTime(seconds) {
        const date = new Date(seconds * 1000);
        const hh = String(Math.floor(seconds / 3600)).padStart(2, '0');
        const mm = String(date.getUTCMinutes()).padStart(2, '0');
        const ss = String(date.getUTCSeconds()).padStart(2, '0');
        const ms = String(date.getUTCMilliseconds()).padStart(3, '0');
        return `${hh}:${mm}:${ss},${ms}`;
    }

    function downloadSrt() {
        const content = document.getElementById('output').value;
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "original_whisper.srt";
        a.click();
    }
</script>

</body>
</html>
