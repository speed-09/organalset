<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper AI Pro - Modern SRT</title>
    <style>
        :root {
            --accent: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1a2a3a, var(--bg));
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 {
            font-size: 26px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-fill-color: transparent;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 12px;
            color: #8b949e;
            margin-left: 5px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: var(--accent);
        }

        .upload-area {
            border: 2px dashed var(--border);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(0, 242, 254, 0.05);
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--accent-gradient);
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:disabled { background: #333; cursor: not-allowed; transform: none; color: #666; }

        #status { margin-top: 15px; font-size: 13px; color: #8b949e; }
        
        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 20px;
            padding: 12px;
            color: #7ee787;
            font-family: monospace;
            display: none;
            box-sizing: border-box;
            resize: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎙️ Whisper AI Pro</h2>
    
    <div class="input-group">
        <label>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</label>
        <input type="password" id="apiKey" placeholder="gsk_xxxxxxxxxxxxxxx">
    </div>

    <div class="upload-area" onclick="document.getElementById('audioFile').click()">
        <span id="fileNameDisplay" style="font-size: 14px;">အသံဖိုင် ရွေးချယ်ရန် နှိပ်ပါ</span>
        <input type="file" id="audioFile" accept="audio/*" onchange="updateFileName()" style="display:none;">
    </div>

    <button id="runBtn" onclick="generateSRT()">စာသားထုတ်ယူမည်</button>
    
    <div id="status">အဆင်သင့်ဖြစ်ပါပြီ</div>
    
    <textarea id="output" readonly></textarea>
</div>

<script>
    function updateFileName() {
        const file = document.getElementById('audioFile').files[0];
        if (file) document.getElementById('fileNameDisplay').innerText = "Selected: " + file.name;
    }

    async function generateSRT() {
        const file = document.getElementById('audioFile').files[0];
        const key = document.getElementById('apiKey').value;
        
        if (!key) return alert("API Key အရင်ထည့်ပေးပါ");
        if (!file) return alert("ဖိုင်အရင်ရွေးပါ");

        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        btn.disabled = true;
        status.innerText = "AI မှ စတင်လုပ်ဆောင်နေပါပြီ...";

        const formData = new FormData();
        formData.append("file", file);
        formData.append("model", "whisper-large-v3");
        formData.append("response_format", "verbose_json");

        try {
            const response = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}` },
                body: formData
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "Key မှားနေပုံရပါတယ်။ ပြန်စစ်ပေးပါ။");

            let finalSRT = "";
            data.segments.forEach((s, i) => {
                finalSRT += `${i+1}\n${formatTime(s.start)} --> ${formatTime(s.end)}\n${s.text.trim()}\n\n`;
            });

            output.value = finalSRT;
            output.style.display = "block";
            status.innerText = "အောင်မြင်စွာ ပြီးစီးပါပြီ!";
        } catch (e) {
            status.innerText = "Error: " + e.message;
        } finally {
            btn.disabled = false;
        }
    }

    function formatTime(seconds) {
        const date = new Date(seconds * 1000);
        const hh = String(date.getUTCHours()).padStart(2, '0');
        const mm = String(date.getUTCMinutes()).padStart(2, '0');
        const ss = String(date.getUTCSeconds()).padStart(2, '0');
        const ms = String(date.getUTCMilliseconds()).padStart(3, '0');
        return `${hh}:${mm}:${ss},${ms}`;
    }
</script>

</body>
</html>
