 <?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:css='false' b:defaultwidgetversion='2' b:layoutsVersion='3' b:responsive='true' b:templateUrl='indie.xml' b:templateVersion='1.3.3' expr:dir='data:blog.languageDirection' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/2005/gml/b' xmlns:data='http://www.google.com/2005/gml/data' xmlns:expr='http://www.google.com/2005/gml/expr'>
<head>
    <meta content='width=device-width, initial-scale=1' name='viewport'/>
    <title><data:blog.pageTitle/></title>
    <b:include data='blog' name='all-head-content'/>

    <!-- Tailwind CSS with Dark Mode Config -->
    <script src='https://cdn.tailwindcss.com'/>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              slate: {
                850: '#151e2e',
                950: '#020617',
              }
            }
          }
        }
      }
    </script>

    <!-- Font Awesome -->
    <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css' rel='stylesheet'/>
    <!-- Google Fonts -->
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'/>

    <!-- Dark Mode Init Script (Prevents Flash) -->
    <script>
      //<![CDATA[
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
      //]]>
    </script>

    <style>
        /* Core Reset */
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .section, .widget { margin: 0; padding: 0; }
        a { text-decoration: none; }
        img { border: 0; }
        #navbar-iframe { display: none !important; }
        
        /* Compact Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* POST BODY STYLING */
        .post-body-content h1 { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 1rem; color: #1e293b; }
        .dark .post-body-content h1 { color: #e2e8f0; }
        
        .post-body-content h2 { font-size: 1.25rem; font-weight: 600; margin: 1.25rem 0 0.75rem; color: #334155; }
        .dark .post-body-content h2 { color: #cbd5e1; }
        
        .post-body-content h3 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #334155; }
        .dark .post-body-content h3 { color: #cbd5e1; }

        .post-body-content p { margin-bottom: 1rem; line-height: 1.7; color: #334155; }
        .dark .post-body-content p { color: #cbd5e1; }

        .post-body-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #334155; }
        .dark .post-body-content ul { color: #cbd5e1; }

        .post-body-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; color: #334155; }
        .dark .post-body-content ol { color: #cbd5e1; }

        /* Center Images */
        .post-body-content img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 0.5rem; 
            margin: 1rem auto; 
            display: block; 
        }
        
        .post-body-content blockquote { border-left: 4px solid #3b82f6; padding-left: 1rem; font-style: italic; color: #475569; margin: 1rem 0; background-color: #f1f5f9; padding: 10px; border-radius: 4px; }
        .dark .post-body-content blockquote { color: #94a3b8; background-color: #1e293b; }

        .post-body-content a { color: #2563eb; text-decoration: underline; }
        .dark .post-body-content a { color: #60a5fa; }

        /* MODERN COMMENT UI */
        #comments { margin-top: 3rem; background: transparent; padding-top: 2rem; border-top: 1px solid #e2e8f0; }
        .dark #comments { border-top: 1px solid #334155; }

        #comments h4 { font-weight: 800; color: #0f172a; font-size: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .dark #comments h4 { color: #e2e8f0; }

        #comments h4::before { content: '\f086'; font-family: 'Font Awesome 6 Free'; color: #3b82f6; font-weight: 900; }
        
        .comment-block { background: white !important; border: 1px solid #e2e8f0 !important; border-radius: 12px !important; padding: 1rem !important; margin-bottom: 1rem !important; box-shadow: 0 1px 2px rgba(0,0,0,0.05) !important; }
        .dark .comment-block { background: #1e293b !important; border: 1px solid #334155 !important; color: #e2e8f0 !important; }
        
        .dark .comment-body { color: #e2e8f0 !important; }
        
        .avatar-image-container { border-radius: 50% !important; border: 2px solid #f1f5f9 !important; width: 40px !important; height: 40px !important; }
        .dark .avatar-image-container { border-color: #334155 !important; }
    </style>

    <b:skin><![CDATA[
    body#layout .header-widget { display: block; }
    ]]></b:skin>
</head>

<body class='text-slate-800 bg-slate-50 dark:bg-slate-950 dark:text-slate-200 antialiased transition-colors duration-300'>

    <!-- 1. Navigation -->
    <nav class='bg-white/90 dark:bg-slate-900/90 backdrop-blur sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800 shadow-sm h-14'>
        <div class='max-w-7xl mx-auto px-4 h-full'>
            <div class='flex justify-between items-center h-full'>
                
                <!-- Left: Menu Icon & Title (Logo Removed) -->
                <div class='flex items-center gap-4'>
                    <!-- Menu Icon -->
                    <button class='text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 transition p-1' onclick='toggleMobileMenu()'>
                        <i class='fas fa-bars text-xl'/>
                    </button>
                    
                    <!-- Blog Title Text -->
                    <a class='text-lg font-bold text-slate-900 dark:text-white tracking-tight' expr:href='data:blog.homepageUrl'>
                        <data:blog.title/>
                    </a>

                    <!-- Hidden Desktop Menu Links (Kept for structure/SEO) -->
                    <div class='hidden md:block ml-4'>
                        <b:section id='main-menu' maxwidgets='1' showaddelement='yes'>
                          <b:widget id='LinkList1' locked='false' title='Main Menu' type='LinkList' version='2' visible='true'>
                            <b:widget-settings>
                              <b:widget-setting name='sorting'>NONE</b:widget-setting>
                              <b:widget-setting name='text-1'>Transcript AI</b:widget-setting>
                              <b:widget-setting name='link-1'>https://www.kopaing.site/p/transcript-ai.html</b:widget-setting>
                              <b:widget-setting name='text-0'>Home</b:widget-setting>
                              <b:widget-setting name='link-0'>https://www.kopaing.site</b:widget-setting>
                            </b:widget-settings>
                            <b:includable id='main'>
                                    <div class='flex items-center space-x-5 text-sm font-medium' id='desktop-menu-links'>
                                        <b:loop values='data:links' var='link'>
                                            <a class='text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition' expr:href='data:link.target'><data:link.name/></a>
                                        </b:loop>
                                    </div>
                                </b:includable>
                            <b:includable id='content'>
                                 <div class='widget-content'><ul><b:loop values='data:links' var='link'><li><a expr:href='data:link.target'><data:link.name/></a></li></b:loop></ul></div>
                            </b:includable>
                          </b:widget>
                        </b:section>
                    </div>
                </div>

                <!-- Right: Dark/Light Mode Toggle -->
                <button class='w-9 h-9 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400 flex items-center justify-center transition hover:scale-110' id='theme-toggle' onclick='toggleTheme()'>
                    <i class='fas fa-moon' id='theme-icon'/>
                </button>

            </div>
        </div>

        <!-- Mobile Menu Dropdown -->
        <div class='hidden bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 absolute w-full left-0 top-14 shadow-lg p-4 z-40' id='mobile-menu-container'>
            <div class='flex flex-col space-y-3 font-medium text-sm' id='mobile-links'>
                <!-- Links will be cloned here by JS -->
            </div>
        </div>
    </nav>

    <!-- 2. Homepage Content Sections -->
    <b:if cond='data:view.isHomepage'>
        
        <!-- AI Tools Grid -->
        <div class='bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 py-0'>
            <div class='max-w-7xl mx-auto px-4'>
                <b:section id='tools-grid-section' maxwidgets='1' showaddelement='yes'>
                  <b:widget id='HTML101' locked='false' title='AI Tools Grid (Edit via Layout)' type='HTML' version='2' visible='true'>
                    <b:widget-settings>
                      <b:widget-setting name='content'/>
                    </b:widget-settings>
                    <b:includable id='main'>
                            <data:content/>
                        </b:includable>
                  </b:widget>
                </b:section>
            </div>
        </div>

        <!-- Main Feature Section -->
        <div class='bg-slate-50 dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 py-12'>
            <div class='max-w-7xl mx-auto px-4'>
                <b:section id='homepage-adsense-info' showaddelement='yes'>
                  <b:widget id='HTML102' locked='false' title='Features &amp;amp; Why Use (Edit via Layout)' type='HTML' version='2' visible='true'>
                    <b:widget-settings>
                      <b:widget-setting name='content'/>
                    </b:widget-settings>
                    <b:includable id='main'>
                            <data:content/>
                        </b:includable>
                  </b:widget>
                </b:section>
            </div>
        </div>
    </b:if>

    <!-- 3. Main Body & Ads -->
    <div expr:class='&quot;max-w-7xl mx-auto &quot; + (data:view.isSingleItem ? &quot;&quot; : &quot;px-4 py-10&quot;)'>
        <b:section class='mb-8' id='top-ad-placement' showaddelement='yes'>
          <b:widget id='HTML103' locked='false' title='Top Ad Section' type='HTML' version='2' visible='true'>
            <b:widget-settings>
              <b:widget-setting name='content'/>
            </b:widget-settings>
            <b:includable id='main'><div class='ad-container'><data:content/></div></b:includable>
          </b:widget>
        </b:section>

        <div class='flex flex-col lg:flex-row gap-8'>
            <!-- Main Content Area -->
            <main expr:class='data:view.isSingleItem ? &quot;w-full&quot; : &quot;w-full lg:w-3/4&quot;'>
                <b:section id='main' showaddelement='yes'>
                  <b:widget id='Blog1' locked='false' title='Blog Posts' type='Blog' version='2' visible='true'>
                    <b:widget-settings>
                      <b:widget-setting name='showDateHeader'>false</b:widget-setting>
                      <b:widget-setting name='style.textcolor'>#ffffff</b:widget-setting>
                      <b:widget-setting name='showShareButtons'>true</b:widget-setting>
                      <b:widget-setting name='showCommentLink'>true</b:widget-setting>
                      <b:widget-setting name='style.urlcolor'>#ffffff</b:widget-setting>
                      <b:widget-setting name='showAuthor'>false</b:widget-setting>
                      <b:widget-setting name='style.linkcolor'>#ffffff</b:widget-setting>
                      <b:widget-setting name='style.unittype'>TextAndImage</b:widget-setting>
                      <b:widget-setting name='style.bgcolor'>#ffffff</b:widget-setting>
                      <b:widget-setting name='showAuthorProfile'>false</b:widget-setting>
                      <b:widget-setting name='style.layout'>1x1</b:widget-setting>
                      <b:widget-setting name='showLabels'>true</b:widget-setting>
                      <b:widget-setting name='showLocation'>true</b:widget-setting>
                      <b:widget-setting name='showTimestamp'>true</b:widget-setting>
                      <b:widget-setting name='postsPerAd'>3</b:widget-setting>
                      <b:widget-setting name='showBacklinks'>false</b:widget-setting>
                      <b:widget-setting name='style.bordercolor'>#ffffff</b:widget-setting>
                      <b:widget-setting name='showInlineAds'>true</b:widget-setting>
                      <b:widget-setting name='showReactions'>false</b:widget-setting>
                    </b:widget-settings>
                    <b:includable id='main' var='top'>
                            <b:if cond='data:view.isMultipleItems'>
                                <div class='flex items-center justify-between mb-8 border-b-2 border-slate-100 dark:border-slate-800 pb-4'>
                                    <h2 class='text-xl font-extrabold text-slate-900 dark:text-white uppercase tracking-tight'>Latest Updates</h2>
                                </div>
                                <div class='grid grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6'>
                                    <b:loop values='data:posts' var='post'>
                                        <article class='bg-white dark:bg-slate-850 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden hover:shadow-lg transition-all flex flex-col h-full'>
                                            <div class='aspect-video w-full bg-slate-50 dark:bg-slate-800 relative overflow-hidden flex-shrink-0'>
                                                <b:if cond='data:post.featuredImage'>
                                                    <a class='block w-full h-full' expr:href='data:post.url'><img class='w-full h-full object-cover transition-transform duration-500 hover:scale-110' expr:alt='data:post.title' expr:src='data:post.featuredImage'/></a>
                                                <b:elseif cond='data:post.firstImageUrl'/>
                                                    <a class='block w-full h-full' expr:href='data:post.url'><img class='w-full h-full object-cover transition-transform duration-500 hover:scale-110' expr:alt='data:post.title' expr:src='data:post.firstImageUrl'/></a>
                                                <b:else/>
                                                    <a class='flex items-center justify-center h-full w-full text-slate-200 dark:text-slate-700 bg-slate-50 dark:bg-slate-800' expr:href='data:post.url'><i class='fas fa-image text-4xl'/></a>
                                                </b:if>
                                            </div>
                                            <div class='p-3 md:p-5 flex flex-col flex-grow'>
                                                <div class='flex items-center gap-2 text-[9px] text-slate-400 dark:text-slate-500 uppercase font-black mb-2'>
                                                    <span class='text-blue-500 dark:text-blue-400'><data:post.author/></span><span>&#8226;</span><span><data:post.timestamp/></span>
                                                </div>
                                                <h3 class='text-sm md:text-base font-bold text-slate-900 dark:text-slate-100 leading-tight line-clamp-2 mb-3'>
                                                    <a class='hover:text-blue-600 dark:hover:text-blue-400 transition-colors' expr:href='data:post.url'><data:post.title/></a>
                                                </h3>
                                                <div class='mt-auto pt-3 border-t border-slate-50 dark:border-slate-700'>
                                                    <a class='text-blue-600 dark:text-blue-400 text-[10px] font-black flex items-center gap-1 group' expr:href='data:post.url'>READ MORE <i class='fas fa-arrow-right text-[8px] transition-transform group-hover:translate-x-1'/></a>
                                                </div>
                                            </div>
                                        </article>
                                    </b:loop>
                                </div>
                                <div class='mt-14 flex justify-center gap-4'>
                                    <b:if cond='data:newerPageUrl'><a class='px-6 py-2.5 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 shadow-sm transition' expr:href='data:newerPageUrl'><i class='fas fa-arrow-left mr-2'/> Newer</a></b:if>
                                    <b:if cond='data:olderPageUrl'><a class='px-6 py-2.5 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 shadow-sm transition' expr:href='data:olderPageUrl'>Older <i class='fas fa-arrow-right ml-2'/></a></b:if>
                                </div>
                            <b:else/>
                                <!-- Single Post View -->
                                <b:loop values='data:posts' var='post'>
                                    <article class='bg-white dark:bg-slate-950 min-h-screen'>
                                        <!-- Header Title & Info -->
                                        <div class='px-4 pt-4 md:px-0'>
                                            <div class='flex items-center gap-3 text-xs text-slate-400 dark:text-slate-500 uppercase font-bold mb-4'>
                                                <span class='bg-blue-50 dark:bg-slate-800 text-blue-600 dark:text-blue-400 px-2 py-1 rounded-md'><data:post.author/></span><span>&#8226;</span><span><data:post.timestamp/></span>
                                            </div>
                                            <h1 class='text-2xl md:text-4xl font-black text-slate-900 dark:text-white leading-tight mb-8'><data:post.title/></h1>
                                        </div>
                                        <!-- Body -->
                                        <div class='post-body-content text-base text-slate-800 dark:text-slate-300 px-4 md:px-0'><data:post.body/></div>
                                        
                                        <div class='mt-12 pt-8 border-t border-slate-100 dark:border-slate-800 flex flex-wrap gap-2 px-4 md:px-0'>
                                            <b:if cond='data:post.labels'><b:loop values='data:post.labels' var='label'><a class='text-xs bg-slate-50 dark:bg-slate-800 px-3 py-1.5 rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 font-medium' expr:href='data:label.url'>#<data:label.name/></a></b:loop></b:if>
                                        </div>
                                    </article>
                                    <b:if cond='data:post.allowComments'>
                                      <div class='px-4 md:px-0' id='comments'>
                                        <h4>User Feedback &amp; Comments</h4>
                                        <div class='comment-box-wrapper p-4 bg-white dark:bg-slate-850 border border-slate-200 dark:border-slate-700 rounded-3xl shadow-sm'><b:include data='post' name='threadedComments'/></div>
                                      </div>
                                    </b:if>
                                </b:loop>
                            </b:if>
                        </b:includable>
                    <b:includable id='aboutPostAuthor'>
                          <div class='author-name'><a class='g-profile' expr:href='data:post.author.profileUrl' rel='author' title='author profile'><span><data:post.author.name/></span></a></div>
                          <div><span class='author-desc'><data:post.author.aboutMe/></span></div>
                        </b:includable>
                    <b:includable id='addComments'><a expr:href='data:post.commentsUrl' expr:onclick='data:post.commentsUrlOnclick'><b:message name='messages.postAComment'/></a></b:includable>
                    <b:includable id='commentAuthorAvatar'><div class='avatar-image-container'><img class='author-avatar' expr:src='data:comment.authorAvatarSrc' height='35' width='35'/></div></b:includable>
                    <b:includable id='commentDeleteIcon' var='comment'>
                          <span expr:class='&quot;item-control &quot; + data:comment.adminClass'>
                            <b:if cond='data:showCmtPopup'>
                              <div class='goog-toggle-button'><div class='goog-inline-block comment-action-icon'/></div>
                            <b:else/>
                              <a class='comment-delete' expr:href='data:comment.deleteUrl' expr:title='data:messages.deleteComment'><img src='https://resources.blogblog.com/img/icon_delete13.gif'/></a>
                            </b:if>
                          </span>
                        </b:includable>
                    <b:includable id='commentForm' var='post'>
                          <div class='comment-form'>
                            <a name='comment-form'/>
                            <h4 id='comment-post-message'><data:messages.postAComment/></h4>
                            <b:if cond='data:this.messages.blogComment != &quot;&quot;'><p><data:this.messages.blogComment/></p></b:if>
                            <b:include data='post' name='commentFormIframeSrc'/>
                            <iframe allowtransparency='allowtransparency' class='blogger-iframe-colorize blogger-comment-from-post' expr:height='data:cmtIframeInitialHeight ?: &quot;90px&quot;' frameborder='0' id='comment-editor' name='comment-editor' src='' width='100%'/>
                            <data:post.cmtfpIframe/>
                            <script type='text/javascript'>BLOG_CMT_createIframe(&#39;<data:post.appRpcRelayPath/>&#39;);</script>
                          </div>
                        </b:includable>
                    <b:includable id='commentFormIframeSrc' var='post'><a expr:href='data:post.commentFormIframeSrc' id='comment-editor-src'/></b:includable>
                    <b:includable id='commentItem' var='comment'>
                          <div class='comment' expr:id='&quot;c&quot; + data:comment.id'>
                            <b:include cond='data:blog.enabledCommentProfileImages' name='commentAuthorAvatar'/>
                            <div class='comment-block'>
                              <div class='comment-author'>
                                <b:if cond='data:comment.authorUrl'>
                                  <b:message name='messages.authorSaidWithLink'><b:param expr:value='data:comment.author' name='authorName'/><b:param expr:value='data:comment.authorUrl' name='authorUrl'/></b:message>
                                <b:else/>
                                  <b:message name='messages.authorSaid'><b:param expr:value='data:comment.author' name='authorName'/></b:message>
                                </b:if>
                              </div>
                              <div expr:class='&quot;comment-body&quot; + (data:comment.isDeleted ? &quot; deleted&quot; : &quot;&quot;)'><data:comment.body/></div>
                              <div class='comment-footer'><span class='comment-timestamp'><a expr:href='data:comment.url' title='comment permalink'><data:comment.timestamp/></a><b:include data='comment' name='commentDeleteIcon'/></span></div>
                            </div>
                          </div>
                        </b:includable>
                    <b:includable id='commentList' var='comments'><div id='comments-block'><b:loop values='data:comments' var='comment'><b:include data='comment' name='commentItem'/></b:loop></div></b:includable>
                    <b:includable id='commentPicker' var='post'>
                          <b:if cond='data:post.showThreadedComments'>
                            <b:include data='post' name='threadedComments'/>
                          <b:else/>
                            <b:include data='post' name='comments'/>
                          </b:if>
                        </b:includable>
                    <b:includable id='comments' var='post'>
                          <section expr:class='&quot;comments&quot; + (data:post.embedCommentForm ? &quot; embed&quot; : &quot;&quot;)' expr:data-num-comments='data:post.numberOfComments' id='comments'>
                            <a name='comments'/>
                            <b:if cond='data:post.allowComments'>
                              <b:include name='commentsTitle'/>
                              <div expr:id='data:widget.instanceId + &quot;_comments-block-wrapper&quot;'><b:include cond='data:post.comments' data='post.comments' name='commentList'/></div>
                              <b:if cond='data:post.commentPagingRequired'>
                                <div class='paging-control-container'>
                                  <b:if cond='data:post.hasOlderLinks'><a expr:class='data:post.oldLinkClass' expr:href='data:post.oldestLinkUrl'><data:messages.oldest/></a><a expr:class='data:post.oldLinkClass' expr:href='data:post.olderLinkUrl'><data:messages.older/></a></b:if>
                                  <span class='comment-range-text'><data:post.commentRangeText/></span>
                                  <b:if cond='data:post.hasNewerLinks'><a expr:class='data:post.newLinkClass' expr:href='data:post.newerLinkUrl'><data:messages.newer/></a><a expr:class='data:post.newLinkClass' expr:href='data:post.newestLinkUrl'><data:messages.newest/></a></b:if>
                                </div>
                              </b:if>
                              <div class='footer'>
                                <b:if cond='data:post.embedCommentForm'>
                                  <b:if cond='data:post.allowNewComments'><b:include data='post' name='commentForm'/><b:else/><data:post.noNewCommentsText/></b:if>
                                <b:else/>
                                  <b:if cond='data:post.allowComments'><b:include data='post' name='addComments'/></b:if>
                                </b:if>
                              </div>
                            </b:if>
                            <b:if cond='data:showCmtPopup'><div id='comment-popup'><iframe allowtransparency='allowtransparency' frameborder='0' id='comment-actions' name='comment-actions' scrolling='no'/></div></b:if>
                          </section>
                        </b:includable>
                    <b:includable id='commentsTitle'><h3 class='title'><data:messages.comments/></h3></b:includable>
                    <b:includable id='feedLinks'>
                          <b:if cond='!data:view.isPost'>
                            <b:if cond='data:feedLinks'><div class='blog-feeds'><b:include data='feedLinks' name='feedLinksBody'/></div></b:if>
                          <b:else/>
                            <div class='post-feeds'><b:loop values='data:posts' var='post'><b:if cond='data:post.allowComments and data:post.feedLinks'><b:include data='post.feedLinks' name='feedLinksBody'/></b:if></b:loop></div>
                          </b:if>
                        </b:includable>
                    <b:includable id='feedLinksBody' var='links'><div class='feed-links'><data:messages.subscribeTo/><b:loop values='data:links' var='f'><a class='feed-link' expr:href='data:f.url' expr:type='data:f.mimeType' target='_blank'><data:f.name/> (<data:f.feedType/>)</a></b:loop></div></b:includable>
                    <b:includable id='homePageLink'><a class='home-link' expr:href='data:blog.homepageUrl'><data:messages.home/></a></b:includable>
                    <b:includable id='iframeComments' var='post'/>
                    <b:includable id='inlineAd' var='post'>
                          <b:if cond='!data:view.isPreview'>
                            <b:if cond='data:this.adCode or data:this.adClientId or data:blog.adsenseClientId'>
                              <div class='inline-ad'>
                                <b:if cond='data:this.adCode != &quot;&quot;'><data:this.adCode/><b:else/><b:include cond='data:this.adClientId or data:blog.adsenseClientId' name='defaultAdUnit'/></b:if>
                              </div>
                            </b:if>
                          <b:else/>
                            <div class='inline-ad'><div class='inline-ad-placeholder'><span><b:message name='messages.adsGoHere'/></span></div></div>
                          </b:if>
                        </b:includable>
                    <b:includable id='nextPageLink'><a class='blog-pager-older-link' expr:href='data:olderPageUrl' expr:id='data:widget.instanceId + &quot;_blog-pager-older-link&quot;' expr:title='data:messages.olderPosts'><data:messages.olderPosts/></a></b:includable>
                    <b:includable id='post' var='post'>
                          <div class='post'>
                            <b:include data='post' name='postMeta'/>
                            <b:include data='post' name='postTitle'/>
                            <b:include name='headerByline'/>
                            <b:if cond='data:view.isSingleItem'>
                              <b:include data='post' name='postBody'/>
                            <b:else/>
                              <b:include data='post' name='postBodySnippet'/>
                              <b:include data='post' name='postJumpLink'/>
                            </b:if>
                            <b:include data='post' name='postFooter'/>
                          </div>
                        </b:includable>
                    <b:includable id='postBody' var='post'><div class='post-body entry-content float-container' expr:id='&quot;post-body-&quot; + data:post.id'><data:post.body/></div></b:includable>
                    <b:includable id='postBodySnippet' var='post'><b:include data='post' name='postBody'/></b:includable>
                    <b:includable id='postCommentsAndAd' var='post'>
                          <article class='post-outer-container'>
                            <div class='post-outer'><b:include data='post' name='post'/></div>
                            <b:include cond='data:view.isSingleItem' data='post' name='commentPicker'/>
                            <b:include cond='data:view.isSingleItem and data:post.includeAd' data='post' name='inlineAd'/>
                          </article>
                          <b:include cond='data:view.isMultipleItems and data:post.includeAd' data='post' name='inlineAd'/>
                        </b:includable>
                    <b:includable id='postCommentsLink'>
                          <b:if cond='data:view.isMultipleItems'>
                            <span class='byline post-comment-link container'>
                              <b:include cond='data:post.commentSource != 1' name='commentsLink'/>
                            </span>
                          </b:if>
                        </b:includable>
                    <b:includable id='postFooter' var='post'><div class='post-footer'><b:include name='footerBylines'/><b:include data='post' name='postFooterAuthorProfile'/></div></b:includable>
                    <b:includable id='postFooterAuthorProfile' var='post'>
                          <b:if cond='data:post.author.aboutMe and data:view.isPost'>
                            <div class='author-profile'>
                              <b:if cond='data:post.author.authorPhoto.url'>
                                <img class='author-image' expr:src='data:post.author.authorPhoto.url' width='50px'/>
                                <div class='author-about'><b:include data='post' name='aboutPostAuthor'/></div>
                              <b:else/>
                                <b:include data='post' name='aboutPostAuthor'/>
                              </b:if>
                            </div>
                          </b:if>
                        </b:includable>
                    <b:includable id='postHeader' var='post'><b:include name='headerByline'/></b:includable>
                    <b:includable id='postMeta' var='post'><b:include data='post' name='postMetadataJSON'/></b:includable>
                    <b:includable id='postPagination'>
                          <div class='blog-pager container' id='blog-pager'>
                            <b:include cond='data:newerPageUrl' name='previousPageLink'/>
                            <b:include cond='data:olderPageUrl' name='nextPageLink'/>
                            <b:include cond='data:view.url != data:blog.homepageUrl' name='homePageLink'/>
                          </div>
                        </b:includable>
                    <b:includable id='postTitle' var='post'>
                          <a expr:name='data:post.id'/>
                          <b:if cond='data:post.title != &quot;&quot;'>
                            <h3 class='post-title entry-title'>
                              <b:if cond='data:post.link or (data:post.url and data:view.url != data:post.url)'>
                                <a expr:href='data:post.link ?: data:post.url'><data:post.title/></a>
                              <b:else/>
                                <data:post.title/>
                              </b:if>
                            </h3>
                          </b:if>
                        </b:includable>
                    <b:includable id='previousPageLink'><a class='blog-pager-newer-link' expr:href='data:newerPageUrl' expr:id='data:widget.instanceId + &quot;_blog-pager-newer-link&quot;' expr:title='data:messages.newerPosts'><data:messages.newerPosts/></a></b:includable>
                    <b:includable id='threadedCommentForm' var='post'>
                          <div class='comment-form'>
                            <a name='comment-form'/>
                            <h4 id='comment-post-message'><data:messages.postAComment/></h4>
                            <b:if cond='data:this.messages.blogComment != &quot;&quot;'><p><data:this.messages.blogComment/></p></b:if>
                            <b:include data='post' name='commentFormIframeSrc'/>
                            <iframe allowtransparency='allowtransparency' class='blogger-iframe-colorize blogger-comment-from-post' expr:height='data:cmtIframeInitialHeight ?: &quot;90px&quot;' frameborder='0' id='comment-editor' name='comment-editor' src='' width='100%'/>
                            <data:post.cmtfpIframe/>
                            <script type='text/javascript'>BLOG_CMT_createIframe(&#39;<data:post.appRpcRelayPath/>&#39;);</script>
                          </div>
                        </b:includable>
                    <b:includable id='threadedCommentJs' var='post'>
                          <script async='async' expr:src='data:post.commentSrc' type='text/javascript'/>
                          <b:template-script inline='true' name='threaded_comments'/>
                          <script type='text/javascript'>blogger.widgets.blog.initThreadedComments(<data:post.commentJso/>,<data:post.commentMsgs/>,<data:post.commentConfig/>);</script>
                        </b:includable>
                    <b:includable id='threadedComments' var='post'>
                          <section class='comments threaded' expr:data-embed='data:post.embedCommentForm' expr:data-num-comments='data:post.numberOfComments' id='comments'>
                            <a name='comments'/>
                            <b:include name='commentsTitle'/>
                            <div class='comments-content'>
                              <b:if cond='data:post.embedCommentForm'><b:include data='post' name='threadedCommentJs'/></b:if>
                              <div id='comment-holder'><data:post.commentHtml/></div>
                            </div>
                            <p class='comment-footer'>
                              <b:if cond='data:post.allowNewComments'><b:include data='post' name='threadedCommentForm'/><b:else/><data:post.noNewCommentsText/></b:if>
                              <b:if cond='data:post.showManageComments'><b:include data='post' name='manageComments'/></b:if>
                            </p>
                            <b:if cond='data:showCmtPopup'><div id='comment-popup'><iframe allowtransparency='allowtransparency' frameborder='0' id='comment-actions' name='comment-actions' scrolling='no'/></div></b:if>
                          </section>
                        </b:includable>
                    <b:includable id='tooltipCss'>
                          <style>
                            .post-body a.b-tooltip-container { position: relative; display: inline-block; }
                            .post-body a.b-tooltip-container .b-tooltip { display: block !important; position: absolute; top: 100%; left: 50%; transform: translate(-20%, 1px); visibility: hidden; opacity: 0; z-index: 1; transition: opacity 0.2s ease-in-out; }
                            .post-body a.b-tooltip-container .b-tooltip iframe { width: 200px; height: 198px; max-width: none; border: none; border-radius: 20px; box-shadow: 1px 1px 3px 1px rgba(0, 0, 0, 0.2); }
                            @media (hover: hover) { .post-body a.b-tooltip-container:hover .b-tooltip { visibility: visible; opacity: 1; } }
                          </style>
                        </b:includable>
                  </b:widget>
                </b:section>
                <b:section class='mt-10' id='bottom-ad-placement' showaddelement='yes'>
                  <b:widget id='HTML104' locked='false' title='Bottom Ad Section' type='HTML' version='2' visible='true'>
                    <b:widget-settings><b:widget-setting name='content'/></b:widget-settings>
                    <b:includable id='main'><div class='ad-container'><data:content/></div></b:includable>
                  </b:widget>
                </b:section>
            </main>

            <!-- Sidebar Content -->
            <b:if cond='!data:view.isSingleItem'>
                <aside class='w-full lg:w-1/4 space-y-6'>
                    <b:section id='sidebar-right' showaddelement='yes'>
                      <b:widget id='HTML105' locked='false' title='Sidebar Ad' type='HTML' version='2' visible='true'>
                        <b:widget-settings><b:widget-setting name='content'/></b:widget-settings>
                        <b:includable id='main'>
                                <div class='bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-dashed border-slate-300 dark:border-slate-600 text-center mb-4'>
                                    <p class='text-[10px] text-slate-400 dark:text-slate-500 font-mono mb-2'>ADVERTISEMENT</p>
                                    <data:content/>
                                </div>
                            </b:includable>
                      </b:widget>
                      <b:widget id='HTML106' locked='false' title='Search Content' type='HTML' version='2' visible='true'>
                        <b:widget-settings><b:widget-setting name='content'/></b:widget-settings>
                        <b:includable id='main'>
                                <div class='bg-white dark:bg-slate-850 rounded-2xl border border-slate-200 dark:border-slate-700 p-4 shadow-sm'>
                                    <form action='/search' class='relative' method='get'>
                                        <input class='w-full bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-xl text-sm py-2.5 px-4 focus:outline-none focus:border-blue-400 dark:focus:border-blue-500 text-slate-700 dark:text-slate-200' name='q' placeholder='Search...' type='text'/>
                                        <button class='absolute right-3 top-3 text-slate-400 dark:text-slate-500' type='submit'><i class='fas fa-search'/></button>
                                    </form>
                                </div>
                            </b:includable>
                      </b:widget>
                      <b:widget id='Label1' locked='false' title='Explore Topics' type='Label' version='2' visible='true'>
                        <b:widget-settings>
                          <b:widget-setting name='sorting'>ALPHA</b:widget-setting>
                          <b:widget-setting name='display'>LIST</b:widget-setting>
                          <b:widget-setting name='selectedLabelsList'/>
                          <b:widget-setting name='showType'>ALL</b:widget-setting>
                          <b:widget-setting name='showFreqNumbers'>true</b:widget-setting>
                        </b:widget-settings>
                        <b:includable id='main'>
                                <div class='bg-white dark:bg-slate-850 rounded-2xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm'>
                                    <h3 class='text-xs font-black text-slate-900 dark:text-white uppercase tracking-widest mb-4'><data:title/></h3>
                                    <ul class='space-y-2'><b:loop values='data:labels' var='label'><li><a class='flex justify-between items-center text-sm text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400' expr:href='data:label.url'><span><data:label.name/></span><span class='bg-slate-100 dark:bg-slate-700 text-slate-400 dark:text-slate-300 px-2 py-0.5 rounded text-[10px]'><data:label.count/></span></a></li></b:loop></ul>
                                </div>
                            </b:includable>
                        <b:includable id='cloud'><b:loop values='data:labels' var='label'><span class='label-size'><b:class expr:name='&quot;label-size-&quot; + data:label.cssSize'/><a class='label-name' expr:href='data:label.url'><data:label.name/><b:if cond='data:this.showFreqNumbers'><span class='label-count'><data:label.count/></span></b:if></a></span></b:loop></b:includable>
                        <b:includable id='content'><div class='widget-content'><b:class expr:name='data:this.display + &quot;-label-widget-content&quot;'/><b:include cond='data:this.display == &quot;list&quot;' name='list'/><b:include cond='data:this.display == &quot;cloud&quot;' name='cloud'/></div></b:includable>
                        <b:includable id='list'><ul><b:loop values='data:labels' var='label'><li><a class='label-name' expr:href='data:label.url'><data:label.name/><b:if cond='data:this.showFreqNumbers'><span class='label-count'><data:label.count/></span></b:if></a></li></b:loop></ul></b:includable>
                      </b:widget>
                    </b:section>
                </aside>
            </b:if>
        </div>
    </div>

    <!-- 4. Footer -->
    <footer class='bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 mt-16 py-12'>
        <div class='max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center text-[10px] md:text-xs text-slate-400 dark:text-slate-500'>
            <div class='mb-6 md:mb-0'>&#169; <span id='year'/> <span class='font-black text-slate-900 dark:text-white'><data:blog.title/></span>. All rights reserved.</div>
            <div class='flex space-x-6'><a class='hover:text-blue-600 dark:hover:text-blue-400 font-bold' href='/p/about.html'>About</a><a class='hover:text-blue-600 dark:hover:text-blue-400 font-bold' href='/p/privacy-policy.html'>Privacy</a><a class='hover:text-blue-600 dark:hover:text-blue-400 font-bold' href='/p/terms-conditions.html'>Terms</a><a class='hover:text-blue-600 dark:hover:text-blue-400 font-bold' href='/p/contact.html'>Contact</a></div>
        </div>
    </footer>

    <script>
    //<![CDATA[
        document.getElementById('year').textContent = new Date().getFullYear();
        
        // Mobile Menu Toggle
        function toggleMobileMenu() { 
            const menu = document.getElementById('mobile-menu-container');
            menu.classList.toggle('hidden');
        }

        // Dark Mode Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                icon.className = 'fas fa-moon';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                icon.className = 'fas fa-sun';
            }
        }

        // Set initial icon based on current mode
        window.addEventListener('load', function() {
            const icon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }

            // Clone Desktop links to Mobile
            var desktopMenu = document.getElementById('desktop-menu-links');
            var mobileContainer = document.getElementById('mobile-links');
            if (desktopMenu && mobileContainer) {
                var links = desktopMenu.querySelectorAll('a');
                if (links.length > 0) {
                    mobileContainer.innerHTML = ''; 
                    links.forEach(function(link) {
                        var newLink = link.cloneNode(true);
                        newLink.className = 'block py-3 text-slate-700 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 border-b border-slate-50 dark:border-slate-800 last:border-0';
                        mobileContainer.appendChild(newLink);
                    });
                }
            }
        });
    //]]>
    </script>
</body>
</html>
