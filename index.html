<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master Pro - Multi Key Input</title>
    <style>
        :root { --accent: #00f2fe; --bg: #0d1117; --card: #161b22; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 15px; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #30363d; width: 100%; max-width: 650px; }
        h2 { color: var(--accent); text-align: center; margin-top: 0; font-size: 22px; }
        .key-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 11px; color: #8b949e; display: block; margin-bottom: 5px; }
        textarea.key-input { width: 100%; height: 90px; background: #010409; color: #ccc; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-size: 11px; resize: none; box-sizing: border-box; }
        .upload-area { border: 2px dashed #30363d; padding: 25px; border-radius: 12px; text-align: center; cursor: pointer; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: black; font-weight: bold; cursor: pointer; font-size: 15px; }
        button:disabled { background: #333; color: #666; }
        #status { text-align: center; margin: 15px 0; font-size: 13px; color: #fbbf24; }
        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        textarea.output { width: 100%; height: 280px; background: #010409; color: #7ee787; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 11px; display: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎙️ AI Master Pro</h2>

    <div class="key-container">
        <div>
            <label>Whisper Keys (တစ်ခုစီခြားထည့်ပါ)</label>
            <textarea id="wKeys" class="key-input" placeholder="gsk_xxxx...&#10;gsk_yyyy..."></textarea>
        </div>
        <div>
            <label>Gemini Keys (တစ်ခုစီခြားထည့်ပါ)</label>
            <textarea id="gKeys" class="key-input" placeholder="AIzaxxxx...&#10;AIzayyyy..."></textarea>
        </div>
    </div>

    <div class="upload-area" onclick="document.getElementById('audioFile').click()">
        <span id="label">အသံဖိုင် ရွေးချယ်ပါ</span>
        <input type="file" id="audioFile" accept="audio/*" style="display:none" onchange="document.getElementById('label').innerText=this.files[0].name">
    </div>

    <button id="runBtn" onclick="processAll()">စတင်လုပ်ဆောင်မည်</button>
    
    <div id="status">Key များကို ထည့်သွင်းပြီး ဖိုင်ရွေးချယ်ပါ</div>

    <div class="results">
        <textarea id="engOut" class="output" readonly></textarea>
        <textarea id="mmOut" class="output" readonly></textarea>
    </div>
</div>

<script>
    async function processAll() {
        const file = document.getElementById('audioFile').files[0];
        const wList = document.getElementById('wKeys').value.trim().split('\n').filter(k => k.trim());
        const gList = document.getElementById('gKeys').value.trim().split('\n').filter(k => k.trim());

        if (!file || wList.length === 0 || gList.length === 0) {
            return alert("Key များနှင့် ဖိုင်ကို အရင်စုံအောင် ထည့်ပေးပါဗျ။");
        }

        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        btn.disabled = true;

        // Step 1: Whisper Rotation
        status.innerText = "အဆင့် (၁) - Whisper ဖြင့် စာသားထုတ်နေသည်...";
        let engSrt = "";
        for (let i = 0; i < wList.length; i++) {
            status.innerText = `Whisper: Key (${i+1}/${wList.length}) ကို သုံးနေသည်...`;
            try {
                engSrt = await getWhisper(file, wList[i].trim());
                if (engSrt) break;
            } catch (e) { console.log(`W-Key ${i+1} fail`); }
        }

        if (!engSrt) {
            status.innerText = "Whisper Error: Key အားလုံး မအောင်မြင်ပါ။ Brave Shield ပိတ်ထားလား စစ်ပေးပါ။";
            btn.disabled = false; return;
        }

        document.getElementById('engOut').value = engSrt;
        document.getElementById('engOut').style.display = "block";

        // Step 2: Gemini Rotation
        status.innerText = "အဆင့် (၂) - Gemini ဖြင့် မြန်မာပြန်နေသည်...";
        let mmSrt = "";
        for (let i = 0; i < gList.length; i++) {
            status.innerText = `Gemini: Key (${i+1}/${gList.length}) ကို သုံးနေသည်...`;
            try {
                mmSrt = await getGemini(engSrt, gList[i].trim());
                if (mmSrt) break;
            } catch (e) { console.log(`G-Key ${i+1} fail`); }
        }

        if (mmSrt) {
            document.getElementById('mmOut').value = mmSrt;
            document.getElementById('mmOut').style.display = "block";
            status.innerText = "အားလုံး အောင်မြင်စွာ ပြီးစီးပါပြီ!";
        } else {
            status.innerText = "Gemini Error: ဘာသာပြန်မှု မအောင်မြင်ပါ။";
        }
        btn.disabled = false;
    }

    async function getWhisper(file, key) {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("model", "whisper-large-v3");
        fd.append("response_format", "verbose_json");
        const res = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
            method: "POST",
            headers: {"Authorization": `Bearer ${key}`},
            body: fd
        });
        if(!res.ok) throw new Error();
        const data = await res.json();
        let srt = "";
        data.segments.forEach((s, i) => {
            srt += `${i+1}\n${formatTime(s.start)} --> ${formatTime(s.end)}\n${s.text.trim()}\n\n`;
        });
        return srt;
    }

    async function getGemini(text, key) {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ contents: [{ parts: [{ text: "Translate to Myanmar SRT format. Keep timestamps unchanged:\n\n" + text }] }] })
        });
        if(!res.ok) throw new Error();
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    function formatTime(s) {
        const d = new Date(s * 1000);
        const pad = (n, l=2) => String(n).padStart(l, '0');
        return `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())},${pad(d.getUTCMilliseconds(), 3)}`;
    }
</script>

</body>
</html>
